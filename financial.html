<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Financial | TSI Redesign</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    /* BREADCRUMB */
    .breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:18px}
    .bc-root{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.5px}
    .sep{color:var(--border)}
    .bc-page{font-size:13px;font-weight:700;color:var(--navy)}

    /* SUBNAV */
    .subnav{display:flex;background:linear-gradient(to bottom,#A8C8E0,#C0D8ED);border-bottom:2px solid #98BBDA;padding:0 16px;margin-bottom:20px;overflow-x:auto}
    .subnav-tab{padding:10px 16px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .12s}
    .subnav-tab:hover{color:var(--navy)}
    .subnav-tab.active{color:var(--navy);border-bottom-color:var(--navy);font-weight:700}

    /* STAT STRIP – overrides only (base in styles.css) */
    .stat-strip{margin-bottom:20px;border-radius:10px;border:1px solid var(--border);overflow:hidden}
    .stat-chip{flex:1;cursor:pointer;transition:background .12s,outline-color .12s;position:relative}
    .stat-chip:hover{background:var(--bg)}
    .stat-chip.active-chip{outline:2.5px solid var(--navy);outline-offset:-2px;background:#ECFEFF}

    /* FILTER ROW */
    .filter-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px}
    .filter-left{display:flex;gap:8px;align-items:center}

    /* TABLE WRAP */
    .tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 2px 16px rgba(var(--primary-rgb),.06)}

    /* RISK BADGES */
    .b-high-risk{background:#FEF2F2;color:var(--red);font-weight:600;padding:2px 8px;border-radius:6px;font-size:11px;display:inline-block}
    .b-moderate{background:#FFFBEB;color:var(--amber);font-weight:600;padding:2px 8px;border-radius:6px;font-size:11px;display:inline-block}
    .b-low-risk{background:#F0FDF4;color:var(--green);font-weight:600;padding:2px 8px;border-radius:6px;font-size:11px;display:inline-block}

    /* TOOLBAR ROW for At Risk / Trending */
    .toolbar-row{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:16px}
    .toolbar-row label{font-size:11px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:4px;cursor:pointer;white-space:nowrap}
    .toolbar-row label input[type="checkbox"]{margin:0}
    .toolbar-sep{width:1px;height:24px;background:var(--border);margin:0 4px}
  </style>
</head>
<body>
<div class="shell">
  <nav class="sidebar">
    <!-- Injected by shell.js -->
  </nav>

  <div class="main">
    <header class="topbar">
      <!-- Injected by shell.js -->
    </header>

    <div class="page-body">
      <div class="breadcrumb"><span class="bc-root">TSI</span><span class="sep">›</span><span class="bc-page">Financial</span></div>

      <!-- SUBNAV -->
      <div class="subnav" id="subnav">
        <div class="subnav-tab active" data-tab="outstanding">Outstanding Invoices</div>
        <div class="subnav-tab" data-tab="drafts">Drafts</div>
        <div class="subnav-tab" data-tab="hold">Clients on Hold</div>
        <div class="subnav-tab" data-tab="payments">Invoice Payments</div>
        <div class="subnav-tab" data-tab="gl">GL Accounts</div>
        <div class="subnav-tab" data-tab="atrisk">At Risk</div>
        <div class="subnav-tab" data-tab="trending">Trending</div>
      </div>

      <!-- STAT STRIP -->
      <div class="stat-strip" id="statStrip">
        <div class="stat-chip active-chip" onclick="switchTab('outstanding')" title="Outstanding A/R">
          <div class="s-icon" style="background:#EDF2F4;color:var(--navy)">$</div>
          <div class="s-data"><div class="s-val s-navy" id="kpiAR">—</div><div class="s-lbl">Outstanding A/R</div></div>
        </div>
        <div class="stat-chip" onclick="switchTab('outstanding','overdue')" title="Overdue invoices">
          <div class="s-icon" style="background:#FEF2F2;color:var(--red)">!</div>
          <div class="s-data"><div class="s-val s-red" id="kpiOverdue">—</div><div class="s-lbl">Overdue</div></div>
        </div>
        <div class="stat-chip" style="cursor:default" title="Average days to payment">
          <div class="s-icon" style="background:#FFFBEB;color:var(--amber)">⏱</div>
          <div class="s-data"><div class="s-val s-amber" id="kpiAging">—</div><div class="s-lbl">Avg Days to Pay</div></div>
        </div>
        <div class="stat-chip" onclick="switchTab('drafts')" title="Draft invoices">
          <div class="s-icon" style="background:#FFFBEB;color:var(--amber)">✎</div>
          <div class="s-data"><div class="s-val s-amber" id="kpiDrafts">—</div><div class="s-lbl">Drafts</div></div>
        </div>
        <div class="stat-chip" onclick="switchTab('hold')" title="Clients on hold">
          <div class="s-icon" style="background:#FEF2F2;color:var(--red)">⊘</div>
          <div class="s-data"><div class="s-val s-red" id="kpiHold">—</div><div class="s-lbl">On Hold</div></div>
        </div>
        <div class="stat-chip" onclick="switchTab('payments')" title="Paid this month">
          <div class="s-icon" style="background:#F0FDF4;color:var(--green)">✓</div>
          <div class="s-data"><div class="s-val s-green" id="kpiPaid">—</div><div class="s-lbl">Paid MTD</div></div>
        </div>
        <div class="stat-chip" style="cursor:default" title="Days Sales Outstanding">
          <div class="s-icon" style="background:#EFF6FF;color:var(--blue)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
          <div class="s-data"><div class="s-val s-blue" id="kpiDSO">42d</div><div class="s-lbl">DSO</div></div>
        </div>
        <div class="stat-chip" style="cursor:default" title="Revenue Month-to-Date">
          <div class="s-icon" style="background:#F0FDF4;color:var(--green)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></div>
          <div class="s-data"><div class="s-val s-green" id="kpiRevMTD">$61,750</div><div class="s-lbl">Revenue MTD</div></div>
        </div>
      </div>

      <!-- FILTER -->
      <div class="filter-row" id="filterRow">
        <div class="filter-left">
          <input class="inp" id="filterSearch" placeholder="Search invoices…" style="width:260px"/>
          <select class="inp" id="filterStatus" style="width:150px;cursor:pointer">
            <option value="">All Statuses</option>
            <option>Unpaid</option><option>Partial</option><option>Overdue</option><option>Paid</option>
          </select>
          <select class="inp" id="filterClient" style="width:180px;cursor:pointer">
            <option value="">All Clients</option>
          </select>
        </div>
        <button class="btn btn-navy" id="btnNewInvoice">+ New Invoice</button>
      </div>

      <!-- AT RISK TOOLBAR -->
      <div class="toolbar-row" id="atriskToolbar" style="display:none">
        <label><input type="checkbox" checked data-expense="outsource"/> Outsource</label>
        <label><input type="checkbox" checked data-expense="gpo"/> GPO</label>
        <label><input type="checkbox" checked data-expense="inventory"/> Inventory</label>
        <label><input type="checkbox" checked data-expense="commissions"/> Commissions</label>
        <label><input type="checkbox" checked data-expense="shipping"/> Shipping</label>
        <label><input type="checkbox" checked data-expense="labor"/> Labor</label>
        <div class="toolbar-sep"></div>
        <label>Min Invoices <input class="inp" type="number" id="arMinInvoices" value="1" min="0" style="width:60px"/></label>
        <div class="toolbar-sep"></div>
        <label>Summary By
          <select class="inp" id="arSummaryBy" style="width:140px;cursor:pointer">
            <option value="department">Department</option>
            <option value="client">Client</option>
            <option value="salesrep">Sales Rep</option>
          </select>
        </label>
        <div class="toolbar-sep"></div>
        <input class="inp" id="arSearch" placeholder="Search…" style="width:200px"/>
      </div>

      <!-- TRENDING TOOLBAR -->
      <div class="toolbar-row" id="trendingToolbar" style="display:none">
        <label>Date From <input class="inp" type="date" id="trDateFrom" style="width:150px"/></label>
        <label>Date To <input class="inp" type="date" id="trDateTo" style="width:150px"/></label>
        <div class="toolbar-sep"></div>
        <input class="inp" id="trRepairDetail" placeholder="Repair Detail…" style="width:160px"/>
        <input class="inp" id="trClient" placeholder="Client…" style="width:160px"/>
        <input class="inp" id="trDepartment" placeholder="Department…" style="width:160px"/>
        <div class="toolbar-sep"></div>
        <button class="btn btn-navy" id="btnTrSearch" onclick="filterTrending()">Search</button>
      </div>

      <!-- TABLE -->
      <div class="tbl-wrap">
        <table>
          <thead id="dataHead">
            <tr>
              <th>Invoice #</th>
              <th>Client</th>
              <th style="text-align:right">Amount</th>
              <th>Issued</th>
              <th>Due Date</th>
              <th style="text-align:right">Aging</th>
              <th>Status</th>
              <th style="width:80px"></th>
            </tr>
          </thead>
          <tbody id="dataBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script src="shell.js"></script>
<script src="mock-db.js"></script>
<script src="mock-api.js"></script>
<script src="api.js"></script>
<script>
(function() {
  'use strict';

  // ── Auth guard ──────────────────────────────────────────
  if (!API.requireAuth()) throw new Error('redirect');

  // ── State ───────────────────────────────────────────────
  let activeTab = 'outstanding';
  let rows = [];
  let isLive = false;
  let searchTimer = null;

  // ── DOM refs ────────────────────────────────────────────
  const body      = document.getElementById('dataBody');
  const head      = document.getElementById('dataHead');
  const badge     = document.getElementById('dataBadge');
  const filterSearch = document.getElementById('filterSearch');
  const filterStatus = document.getElementById('filterStatus');
  const filterClient = document.getElementById('filterClient');
  const filterRow    = document.getElementById('filterRow');

  // ── Data badge ──────────────────────────────────────────

  // ── Helpers ─────────────────────────────────────────────
  function fmt$(v) { return '$' + Number(v || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function fmtDate(d) { if (!d) return '—'; const dt = new Date(d); return isNaN(dt) ? '—' : dt.toLocaleDateString('en-US', { month: '2-digit', day: '2-digit', year: 'numeric' }); }
  function agingDays(d) { if (!d) return 0; const dt = new Date(d); return isNaN(dt) ? 0 : Math.max(0, Math.round((Date.now() - dt) / 86400000)); }
  function esc(s) { const el = document.createElement('span'); el.textContent = s || ''; return el.innerHTML; }

  function statusBadge(st) {
    const s = (st || '').toLowerCase();
    if (s.includes('paid') && !s.includes('un'))     return '<span class="badge" style="background:#F0FDF4;color:var(--green)">Paid</span>';
    if (s.includes('partial'))                        return '<span class="badge" style="background:#FFFBEB;color:var(--amber)">Partial</span>';
    if (s.includes('overdue') || s.includes('past'))  return '<span class="badge" style="background:#FEF2F2;color:var(--red)">Overdue</span>';
    if (s.includes('draft'))                          return '<span class="badge" style="background:#F0F4FF;color:var(--blue)">Draft</span>';
    if (s.includes('hold'))                           return '<span class="badge" style="background:#FEF2F2;color:var(--red)">On Hold</span>';
    return '<span class="badge" style="background:#FEF2F2;color:var(--red)">Unpaid</span>';
  }

  function agingColor(days) {
    if (days > 30) return 'color:var(--red);font-weight:700';
    if (days > 14) return 'color:var(--amber);font-weight:600';
    return 'color:var(--muted)';
  }

  function amtColor(status) {
    const s = (status || '').toLowerCase();
    if (s.includes('paid') && !s.includes('un')) return 'var(--green)';
    if (s.includes('overdue') || s.includes('past')) return 'var(--red)';
    return 'var(--navy)';
  }

  // ── Unwrap API response ─────────────────────────────────
  function unwrap(data) {
    if (Array.isArray(data)) return data;
    if (data && Array.isArray(data.dataSource)) return data.dataSource;
    if (data && Array.isArray(data.data)) return data.data;
    return [];
  }

  // Normalize API field names to page-expected names
  // API returns sTranNumber/dblTranAmount/dtTranDate instead of sInvoiceNumber/dblAmount/dtIssuedDate
  function normalizeFinancialRow(r) {
    r.sInvoiceNumber = r.sInvoiceNumber || r.sTranNumber || '';
    r.dblAmount      = r.dblAmount      || r.dblTranAmount || r.dblInvoiceAmount || r.balance || 0;
    r.dtIssuedDate   = r.dtIssuedDate   || r.dtTranDate   || r.dtInvoiceDate    || null;
    r.sStatus        = r.sStatus        || (r.aging > 0 ? 'Unpaid' : 'Unpaid');
    return r;
  }

  const HEADERS = {

    trending:    '<tr><th>Period</th><th style="text-align:right">Repairs In</th><th style="text-align:right">Repairs Out</th><th style="text-align:right">Avg TAT</th><th style="text-align:right">Revenue</th><th style="text-align:right">Expenses</th><th style="text-align:right">Margin %</th></tr>'
  };

  // ── Demo data sets ──────────────────────────────────────
  const DEMO = {

      { sInvoiceNumber:'INV-2026-0284', sClientName1:'88th Medical Group', dblAmount:2840, dtIssuedDate:'2026-02-25', dtDueDate:'2026-03-25', sStatus:'Unpaid', lInvoiceKey:284 },

    ],
    drafts: [
      { sInvoiceNumber:'DRF-2026-0050', sClientName1:'88th Medical Group', dblAmount:1200, dtCreatedDate:'2026-03-05', sStatus:'Draft', lInvoiceKey:50 },
      { sInvoiceNumber:'DRF-2026-0049', sClientName1:'Nashville General Hospital', dblAmount:3400, dtCreatedDate:'2026-03-02', sStatus:'Draft', lInvoiceKey:49 }
    ],
    hold: [
      { sClientName1:'West Side GI Center', sDepartmentName:'Endoscopy', dtOnHoldDate:'2026-02-15', sReason:'Past due > 60 days', lClientKey:41 },
      { sClientName1:'Shreveport Endoscopy Center', sDepartmentName:'GI Lab', dtOnHoldDate:'2026-01-20', sReason:'Billing dispute', lClientKey:55 }
    ],
    payments: [
      { sInvoiceNumber:'INV-2026-0229', sClientName1:'Northside Hospital', dblAmount:4480, dtPaymentDate:'2026-02-20', sPaymentMethod:'ACH', lInvoicePaymentID:10 },
      { sInvoiceNumber:'INV-2026-0215', sClientName1:'Metro Health Hospital', dblAmount:2100, dtPaymentDate:'2026-02-13', sPaymentMethod:'Check', lInvoicePaymentID:11 },
      { sInvoiceNumber:'INV-2026-0258', sClientName1:'Nashville General Hospital', dblAmount:2000, dtPaymentDate:'2026-03-01', sPaymentMethod:'ACH', lInvoicePaymentID:12 }
    ],
    gl: [
      { sAccountNumber:'1000', sAccountName:'Cash', sType:'Asset', sDescription:'Operating cash account', lGLAccountKey:1 },
      { sAccountNumber:'1200', sAccountName:'Accounts Receivable', sType:'Asset', sDescription:'Trade receivables', lGLAccountKey:2 },
      { sAccountNumber:'4000', sAccountName:'Repair Revenue', sType:'Revenue', sDescription:'Income from repair services', lGLAccountKey:3 },
      { sAccountNumber:'4100', sAccountName:'Product Sales Revenue', sType:'Revenue', sDescription:'Income from product sales', lGLAccountKey:4 },
      { sAccountNumber:'5000', sAccountName:'Cost of Goods Sold', sType:'Expense', sDescription:'Parts and materials', lGLAccountKey:5 }
    ],
    atrisk: [
      { sName:'Endoscopy Dept – West Side GI', dblRevenue:18200, dblExpenses:19800, dblMargin:-8.79, nInvoices:12, sRisk:'High Risk', expenses:{ outsource:6200, gpo:3100, inventory:4500, commissions:1800, shipping:1200, labor:3000 } },

      { sName:'Central Sterile – 88th Medical', dblRevenue:14800, dblExpenses:14200, dblMargin:4.05, nInvoices:9, sRisk:'Moderate', expenses:{ outsource:4200, gpo:2100, inventory:3500, commissions:1400, shipping:800, labor:2200 } },
      { sName:'Pulmonology – Nashville General', dblRevenue:22100, dblExpenses:21500, dblMargin:2.71, nInvoices:14, sRisk:'Moderate', expenses:{ outsource:6500, gpo:3200, inventory:5100, commissions:2500, shipping:1200, labor:3000 } },
      { sName:'Endoscopy – Northside Hospital', dblRevenue:27600, dblExpenses:22400, dblMargin:18.84, nInvoices:16, sRisk:'Low', expenses:{ outsource:6800, gpo:3400, inventory:5200, commissions:2800, shipping:1400, labor:2800 } },
      { sName:'GI Lab – Metro Health', dblRevenue:19300, dblExpenses:16100, dblMargin:16.58, nInvoices:11, sRisk:'Low', expenses:{ outsource:4800, gpo:2400, inventory:3800, commissions:1900, shipping:1000, labor:2200 } },
      { sName:'Surgery – Nashville General', dblRevenue:35200, dblExpenses:29800, dblMargin:15.34, nInvoices:22, sRisk:'Low', expenses:{ outsource:9200, gpo:4600, inventory:7000, commissions:3500, shipping:1800, labor:3700 } }
    ],
    trending: [
      { sPeriod:'Oct 2025', nIn:42, nOut:38, sAvgTAT:'6.2d', dblRevenue:58400, dblExpenses:49200, dblMarginPct:15.75 },
      { sPeriod:'Nov 2025', nIn:47, nOut:41, sAvgTAT:'5.8d', dblRevenue:63100, dblExpenses:54800, dblMarginPct:13.15 },
      { sPeriod:'Dec 2025', nIn:35, nOut:44, sAvgTAT:'7.1d', dblRevenue:52800, dblExpenses:48600, dblMarginPct:7.95 },
      { sPeriod:'Jan 2026', nIn:51, nOut:46, sAvgTAT:'5.4d', dblRevenue:71200, dblExpenses:62100, dblMarginPct:12.78 },
      { sPeriod:'Feb 2026', nIn:48, nOut:50, sAvgTAT:'4.9d', dblRevenue:67500, dblExpenses:64300, dblMarginPct:4.74 },
      { sPeriod:'Mar 2026', nIn:29, nOut:22, sAvgTAT:'5.6d', dblRevenue:38900, dblExpenses:41200, dblMarginPct:-5.91 }
    ]
  };

  // ── Load data per tab ───────────────────────────────────
  async function loadTab(tab) {
    activeTab = tab;
    head.innerHTML = HEADERS[tab] || HEADERS.outstanding;

    // Show/hide filters and toolbars based on tab
    var showFilters = (tab === 'outstanding' || tab === 'drafts' || tab === 'payments');
    filterRow.style.display = showFilters ? '' : 'none';
    document.getElementById('atriskToolbar').style.display = (tab === 'atrisk') ? '' : 'none';
    document.getElementById('trendingToolbar').style.display = (tab === 'trending') ? '' : 'none';

    // Update active chip highlight
    document.querySelectorAll('.stat-chip').forEach(c => c.classList.remove('active-chip'));
    const chipMap = { outstanding: 0, drafts: 3, hold: 4, payments: 5, gl: -1 };
    const idx = chipMap[tab]; if (idx >= 0) document.querySelectorAll('.stat-chip')[idx]?.classList.add('active-chip');

    // Reset filters on tab switch
    filterSearch.value = '';
    filterStatus.value = '';
    filterClient.value = '';

    body.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:24px;color:var(--muted)">Loading...</td></tr>';

    try {
      let raw;
      const pg = { Pagination: { PageNumber: 1, PageSize: 200 }, Filters: {} };
      // At Risk and Trending use local demo data only (no API endpoint)
      if (tab === 'atrisk' || tab === 'trending') {
        rows = DEMO[tab] || [];
        isLive = false;
        API.UI.updateDemoBadge('demo');
        if (tab === 'atrisk') { renderAtRisk(); return; }
        if (tab === 'trending') { renderTrending(); return; }
      }

      switch (tab) {
        case 'outstanding': raw = await API.getOutstandingInvoices(pg); break;
        case 'drafts':      raw = await API.getDraftInvoices(pg); break;
        case 'hold':        raw = await API.getClientsOnHold(pg); break;
        case 'payments':    raw = await API.getInvoicePayments(pg); break;
        case 'gl':          raw = await API.getGLAccounts(); break;
      }
      rows = unwrap(raw).map(normalizeFinancialRow);
      isLive = true;
      API.UI.updateDemoBadge('api');
      if (tab === 'outstanding') updateFinancialKPIs(rows);
    } catch (e) {
      console.warn('[TSI Financial] API unavailable, using demo data:', e.message);
      rows = DEMO[tab] || [];
      isLive = false;
      API.UI.updateDemoBadge('demo');
      // For atrisk/trending, use dedicated renderers
      if (tab === 'atrisk') { renderAtRisk(); return; }
      if (tab === 'trending') { renderTrending(); return; }
    }

    populateClientFilter();
    renderRows();
  }

  // ── Update financial KPI chips ──────────────────────────
  async function updateFinancialKPIs(liveOutstanding) {
    const inv = liveOutstanding || DEMO.outstanding;
    const open = inv.filter(r => { const s = (r.sStatus || '').toLowerCase(); return !s.includes('paid') || s.includes('un'); });
    const overdue = inv.filter(r => (r.sStatus || '').toLowerCase().includes('overdue'));

    const totalAR = open.reduce((s, r) => s + Number(r.dblAmount || r.dblTranAmount || 0), 0);

    let totalAgingDays = 0, agingCount = 0;
    open.forEach(r => {
      const d = agingDays(r.dtIssuedDate || r.dtTranDate);
      if (d > 0) { totalAgingDays += d; agingCount++; }
    });

    document.getElementById('kpiAR').textContent = fmt$(totalAR);
    document.getElementById('kpiOverdue').textContent = String(overdue.length);
    document.getElementById('kpiAging').textContent = agingCount ? Math.round(totalAgingDays / agingCount) + 'd' : '0d';

    // Load drafts, hold, payments counts independently
    const pg = { Pagination: { PageNumber: 1, PageSize: 200 }, Filters: {} };
    let draftsCount, holdCount, totalPaid;
    try {
      const [draftsRaw, holdRaw, paymentsRaw] = await Promise.all([
        API.getDraftInvoices(pg).catch(() => null),
        API.getClientsOnHold(pg).catch(() => null),
        API.getInvoicePayments(pg).catch(() => null)
      ]);
      draftsCount = draftsRaw ? unwrap(draftsRaw).length : DEMO.drafts.length;
      holdCount = holdRaw ? unwrap(holdRaw).length : DEMO.hold.length;
      const payments = paymentsRaw ? unwrap(paymentsRaw) : DEMO.payments;
      totalPaid = payments.reduce((s, r) => s + Number(r.dblAmount || r.dblPaymentAmount || 0), 0);
    } catch (e) {
      draftsCount = DEMO.drafts.length;
      holdCount = DEMO.hold.length;
      totalPaid = DEMO.payments.reduce((s, r) => s + Number(r.dblAmount || r.dblPaymentAmount || 0), 0);
    }
    document.getElementById('kpiDrafts').textContent = String(draftsCount);
    document.getElementById('kpiHold').textContent = String(holdCount);
    document.getElementById('kpiPaid').textContent = fmt$(totalPaid);
  }

  // ── Populate client dropdown ────────────────────────────
  function populateClientFilter() {
    const clients = [...new Set(rows.map(r => r.sClientName1 || r.sClientName || '').filter(Boolean))].sort();
    filterClient.innerHTML = '<option value="">All Clients</option>' + clients.map(c => '<option>' + esc(c) + '</option>').join('');
  }

  // ── Filter logic ────────────────────────────────────────
  function getFiltered() {
    const q = (filterSearch.value || '').toLowerCase();
    const st = (filterStatus.value || '').toLowerCase();
    const cl = filterClient.value || '';
    return rows.filter(r => {
      const name = (r.sClientName1 || r.sClientName || '').toLowerCase();
      const inv = (r.sInvoiceNumber || r.sTranNumber || r.sAccountNumber || r.sAccountName || '').toLowerCase();
      const status = (r.sStatus || '').toLowerCase();
      if (q && !name.includes(q) && !inv.includes(q)) return false;
      if (st && !status.includes(st)) return false;
      if (cl && (r.sClientName1 || r.sClientName || '') !== cl) return false;
      return true;
    });
  }

  // ── Render rows ─────────────────────────────────────────
  function renderRows() {
    const data = getFiltered();
    if (!data.length) {
      body.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:24px;color:var(--muted)">No records found</td></tr>';
      return;
    }

    switch (activeTab) {
      case 'outstanding': renderOutstanding(data); break;
      case 'drafts':      renderDrafts(data); break;
      case 'hold':        renderHold(data); break;
      case 'payments':    renderPayments(data); break;
      case 'gl':          renderGL(data); break;
      case 'atrisk':      renderAtRisk(); break;
      case 'trending':    renderTrending(); break;
    }
  }

  function renderOutstanding(data) {
    body.innerHTML = data.map(r => {
      const days = agingDays(r.dtIssuedDate || r.dtInvoiceDate);
      const st = r.sStatus || 'Unpaid';
      const isOverdue = st.toLowerCase().includes('overdue');
      return '<tr' + (isOverdue ? ' style="background:#FEF9F9"' : '') + '>' +
        '<td style="color:var(--blue);font-weight:600">' + esc(r.sInvoiceNumber) + '</td>' +
        '<td>' + esc(r.sClientName1 || r.sClientName) + '</td>' +
        '<td style="text-align:right;font-weight:700;color:' + amtColor(st) + '">' + fmt$(r.dblAmount || r.dblInvoiceAmount) + '</td>' +
        '<td style="color:var(--muted)">' + fmtDate(r.dtIssuedDate || r.dtInvoiceDate) + '</td>' +
        '<td' + (isOverdue ? ' style="color:var(--red);font-weight:600"' : '') + '>' + fmtDate(r.dtDueDate) + '</td>' +
        '<td style="text-align:right;' + agingColor(days) + '">' + days + 'd</td>' +
        '<td>' + statusBadge(st) + '</td>' +
        '<td style="text-align:right"><button class="edit-btn" onclick="viewInvoice(' + (r.lInvoiceKey || 0) + ')">View</button></td>' +
        '</tr>';
    }).join('');
  }

  function renderDrafts(data) {
    body.innerHTML = data.map(r => {
      return '<tr>' +
        '<td style="color:var(--blue);font-weight:600">' + esc(r.sInvoiceNumber) + '</td>' +
        '<td>' + esc(r.sClientName1 || r.sClientName) + '</td>' +
        '<td style="text-align:right;font-weight:700;color:var(--navy)">' + fmt$(r.dblAmount || r.dblInvoiceAmount) + '</td>' +
        '<td style="color:var(--muted)">' + fmtDate(r.dtCreatedDate || r.dtIssuedDate) + '</td>' +
        '<td>' + statusBadge('Draft') + '</td>' +
        '<td style="text-align:right"><button class="edit-btn" onclick="viewInvoice(' + (r.lInvoiceKey || 0) + ')">Edit</button>' +
        ' <button class="edit-btn" style="background:#FEF2F2;color:var(--red)" onclick="deleteDraft(' + (r.lInvoiceKey || 0) + ')">Del</button></td>' +
        '</tr>';
    }).join('');
  }

  function renderHold(data) {
    body.innerHTML = data.map(r => {
      return '<tr>' +
        '<td style="font-weight:600">' + esc(r.sClientName1 || r.sClientName) + '</td>' +
        '<td>' + esc(r.sDepartmentName || '') + '</td>' +
        '<td style="color:var(--muted)">' + fmtDate(r.dtOnHoldDate || r.dtHoldDate) + '</td>' +
        '<td>' + esc(r.sReason || r.sHoldReason || '') + '</td>' +
        '<td style="text-align:right"><button class="edit-btn" onclick="releaseHold(' + (r.lClientKey || 0) + ')">Release</button></td>' +
        '</tr>';
    }).join('');
  }

  function renderPayments(data) {
    body.innerHTML = data.map(r => {
      return '<tr>' +
        '<td style="color:var(--blue);font-weight:600">' + esc(r.sInvoiceNumber) + '</td>' +
        '<td>' + esc(r.sClientName1 || r.sClientName) + '</td>' +
        '<td style="text-align:right;font-weight:700;color:var(--green)">' + fmt$(r.dblAmount || r.dblPaymentAmount) + '</td>' +
        '<td style="color:var(--muted)">' + fmtDate(r.dtPaymentDate) + '</td>' +
        '<td>' + esc(r.sPaymentMethod || r.sMethod || '') + '</td>' +
        '<td style="text-align:right"><button class="edit-btn" onclick="viewInvoice(' + (r.lInvoiceKey || 0) + ')">View</button></td>' +
        '</tr>';
    }).join('');
  }

  function renderGL(data) {
    body.innerHTML = data.map(r => {
      return '<tr>' +
        '<td style="font-weight:600">' + esc(r.sAccountNumber || r.sGLAccountNumber || '') + '</td>' +
        '<td>' + esc(r.sAccountName || r.sGLAccountName || '') + '</td>' +
        '<td>' + esc(r.sType || r.sAccountType || '') + '</td>' +
        '<td style="color:var(--muted)">' + esc(r.sDescription || '') + '</td>' +
        '<td style="text-align:right"><button class="edit-btn" onclick="editGL(' + (r.lGLAccountKey || 0) + ')">Edit</button></td>' +
        '</tr>';
    }).join('');
  }

  // ── At Risk: render & filter ───────────────────────────
  function renderAtRisk() {
    head.innerHTML = HEADERS.atrisk;
    var data = filterAtRiskData();
    if (!data.length) {
      body.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--muted)">No at-risk records found</td></tr>';
      return;
    }
    body.innerHTML = data.map(function(r) {
      var marginStyle = r.dblMargin < 0 ? 'color:var(--red);font-weight:700' : (r.dblMargin < 10 ? 'color:var(--amber);font-weight:600' : 'color:var(--green);font-weight:600');
      var riskClass = r.sRisk === 'High Risk' ? 'b-high-risk' : (r.sRisk === 'Moderate' ? 'b-moderate' : 'b-low-risk');
      return '<tr>' +
        '<td style="font-weight:600">' + esc(r.sName) + '</td>' +
        '<td style="text-align:right;font-weight:600;color:var(--navy)">' + fmt$(r._filteredRevenue != null ? r._filteredRevenue : r.dblRevenue) + '</td>' +
        '<td style="text-align:right;font-weight:600;color:var(--muted)">' + fmt$(r._filteredExpenses != null ? r._filteredExpenses : r.dblExpenses) + '</td>' +
        '<td style="text-align:right;' + marginStyle + '">' + (r._filteredMargin != null ? r._filteredMargin : r.dblMargin).toFixed(2) + '%</td>' +
        '<td style="text-align:right">' + r.nInvoices + '</td>' +
        '<td><span class="' + riskClass + '">' + esc(r.sRisk) + '</span></td>' +
        '</tr>';
    }).join('');
  }

  function filterAtRiskData() {
    var q = (document.getElementById('arSearch').value || '').toLowerCase();
    var minInv = parseInt(document.getElementById('arMinInvoices').value, 10) || 0;
    var checkedExpenses = [];
    document.querySelectorAll('#atriskToolbar input[data-expense]').forEach(function(cb) {
      if (cb.checked) checkedExpenses.push(cb.getAttribute('data-expense'));
    });

    var data = (DEMO.atrisk || []).slice();
    return data.filter(function(r) {
      if (q && r.sName.toLowerCase().indexOf(q) === -1) return false;
      if (r.nInvoices < minInv) return false;
      // Recalculate expenses based on checked categories
      if (r.expenses) {
        var filteredExp = 0;
        checkedExpenses.forEach(function(cat) { filteredExp += (r.expenses[cat] || 0); });
        r._filteredExpenses = filteredExp;
        r._filteredRevenue = r.dblRevenue;
        r._filteredMargin = r._filteredRevenue > 0 ? ((r._filteredRevenue - filteredExp) / r._filteredRevenue) * 100 : 0;
      }
      return true;
    });
  }

  window.filterAtRisk = function() {
    renderAtRisk();
  };

  // ── Trending: render & filter ─────────────────────────
  function renderTrending() {
    head.innerHTML = HEADERS.trending;
    var data = filterTrendingData();
    if (!data.length) {
      body.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--muted)">No trending data found</td></tr>';
      return;
    }
    body.innerHTML = data.map(function(r) {
      var marginStyle = r.dblMarginPct < 0 ? 'color:var(--red);font-weight:700' : (r.dblMarginPct < 10 ? 'color:var(--amber);font-weight:600' : 'color:var(--green);font-weight:600');
      return '<tr>' +
        '<td style="font-weight:600">' + esc(r.sPeriod) + '</td>' +
        '<td style="text-align:right">' + r.nIn + '</td>' +
        '<td style="text-align:right">' + r.nOut + '</td>' +
        '<td style="text-align:right;color:var(--muted)">' + esc(r.sAvgTAT) + '</td>' +
        '<td style="text-align:right;font-weight:600;color:var(--navy)">' + fmt$(r.dblRevenue) + '</td>' +
        '<td style="text-align:right;font-weight:600;color:var(--muted)">' + fmt$(r.dblExpenses) + '</td>' +
        '<td style="text-align:right;' + marginStyle + '">' + r.dblMarginPct.toFixed(2) + '%</td>' +
        '</tr>';
    }).join('');
  }

  function filterTrendingData() {
    var dateFrom = document.getElementById('trDateFrom').value;
    var dateTo = document.getElementById('trDateTo').value;
    var repairQ = (document.getElementById('trRepairDetail').value || '').toLowerCase();
    var clientQ = (document.getElementById('trClient').value || '').toLowerCase();
    var deptQ = (document.getElementById('trDepartment').value || '').toLowerCase();

    var data = (DEMO.trending || []).slice();
    // Date filtering: parse period "Mon YYYY" to approximate date
    var MONTHS = { 'jan':0,'feb':1,'mar':2,'apr':3,'may':4,'jun':5,'jul':6,'aug':7,'sep':8,'oct':9,'nov':10,'dec':11 };
    return data.filter(function(r) {
      if (dateFrom || dateTo) {
        var parts = r.sPeriod.split(' ');
        var mIdx = MONTHS[(parts[0] || '').toLowerCase().substring(0, 3)];
        var yr = parseInt(parts[1], 10);
        if (!isNaN(mIdx) && !isNaN(yr)) {
          var periodDate = new Date(yr, mIdx, 1);
          if (dateFrom && periodDate < new Date(dateFrom)) return false;
          if (dateTo && periodDate > new Date(dateTo)) return false;
        }
      }
      // Text filters are placeholders for future API integration; demo data has no client/dept/detail fields
      return true;
    });
  }

  window.filterTrending = function() {
    renderTrending();
  };

  // ── Global: switch tab from chip click ──────────────────
  window.switchTab = function(tab, filter) {
    document.querySelectorAll('.subnav-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === tab);
    });
    loadTab(tab);
    if (filter === 'overdue') {
      setTimeout(() => { filterStatus.value = 'Overdue'; renderRows(); }, 50);
    }
  };

  // ── Global action stubs ─────────────────────────────────
  window.viewInvoice = function(key) {
    console.log('[TSI Financial] View invoice:', key);
    // TODO: open detail panel or modal
  };
  window.deleteDraft = async function(key) {
    if (!confirm('Delete this draft invoice?')) return;
    try { await API.deleteDraftInvoice(key); loadTab('drafts'); }
    catch (e) { console.warn('Delete failed:', e.message); }
  };
  window.releaseHold = async function(clientKey) {
    if (!confirm('Release hold on this client?')) return;
    try { await API.clientUpdateOnHold({ plClientKey: clientKey, pbOnHold: false }); loadTab('hold'); }
    catch (e) { console.warn('Release failed:', e.message); }
  };
  window.editGL = function(key) {
    console.log('[TSI Financial] Edit GL account:', key);
  };

  // ── Wire sub-nav tabs ──────────────────────────────────
  document.querySelectorAll('.subnav-tab').forEach(tab => {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.subnav-tab').forEach(t => t.classList.remove('active'));
      this.classList.add('active');
      loadTab(this.dataset.tab);
    });
  });

  // ── Wire filters ───────────────────────────────────────
  filterSearch.addEventListener('input', function() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(renderRows, 200);
  });
  filterStatus.addEventListener('change', renderRows);
  filterClient.addEventListener('change', renderRows);

  // ── Wire At Risk toolbar ──────────────────────────────
  document.querySelectorAll('#atriskToolbar input[data-expense]').forEach(function(cb) {
    cb.addEventListener('change', function() { if (activeTab === 'atrisk') renderAtRisk(); });
  });
  document.getElementById('arMinInvoices').addEventListener('input', function() { if (activeTab === 'atrisk') renderAtRisk(); });
  document.getElementById('arSummaryBy').addEventListener('change', function() { if (activeTab === 'atrisk') renderAtRisk(); });
  var arSearchTimer = null;
  document.getElementById('arSearch').addEventListener('input', function() {
    clearTimeout(arSearchTimer);
    arSearchTimer = setTimeout(function() { if (activeTab === 'atrisk') renderAtRisk(); }, 200);
  });

  // ── Wire Trending toolbar ────────────────────────────
  document.getElementById('trDateFrom').addEventListener('change', function() { if (activeTab === 'trending') renderTrending(); });
  document.getElementById('trDateTo').addEventListener('change', function() { if (activeTab === 'trending') renderTrending(); });

  // ── Init ───────────────────────────────────────────────
  API.UI.init();
  updateFinancialKPIs();
  loadTab('outstanding');

})();
</script>
<script src="js/new-order-wizard.js"></script>
<script src="js/order-search.js"></script>
</body>
