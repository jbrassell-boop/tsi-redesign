<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Financial | TSI Redesign</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    /* SUBNAV */
    .subnav{display:flex;background:var(--neutral-50);border-bottom:1px solid var(--neutral-200);padding:0 16px;overflow-x:auto}
    .subnav-tab{padding:10px 16px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .12s}
    .subnav-tab:hover{color:var(--navy)}
    .subnav-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:700}

    /* STAT STRIP – overrides only (base in styles.css) */
    .stat-strip{margin-bottom:20px;border-radius:10px;border:1px solid var(--border);overflow:hidden}
    .stat-chip{flex:1;cursor:pointer;transition:background .12s,outline-color .12s;position:relative}
    .stat-chip:hover{background:var(--bg)}
    .stat-chip.active-chip{outline:2.5px solid var(--navy);outline-offset:-2px;background:var(--primary-light)}

    /* FILTER ROW */
    .filter-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px}
    .filter-left{display:flex;gap:8px;align-items:center}

    /* TABLE WRAP */
    .tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 2px 16px rgba(var(--primary-rgb),.06)}

    /* TOOLBAR ROW for At Risk / Trending */
    .toolbar-row{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:16px}
    .toolbar-row label{font-size:11px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:4px;cursor:pointer;white-space:nowrap}
    .toolbar-row label input[type="checkbox"]{margin:0}
    .toolbar-sep{width:1px;height:24px;background:var(--border);margin:0 4px}
  </style>
</head>
<body>
<div class="shell">
  <nav class="sidebar">
    <!-- Injected by shell.js -->
  </nav>

  <div class="main">
    <header class="topbar">
      <!-- Injected by shell.js -->
    </header>

    <div class="page-body">
      <!-- SUBNAV -->
      <div class="subnav" id="subnav">
        <div class="subnav-tab active" data-tab="outstanding">Outstanding Invoices</div>
        <div class="subnav-tab" data-tab="drafts">Drafts</div>
        <div class="subnav-tab" data-tab="hold">Clients on Hold</div>
        <div class="subnav-tab" data-tab="payments">Invoice Payments</div>
        <div class="subnav-tab" data-tab="gl">GL Accounts</div>
        <div class="subnav-tab" data-tab="atrisk">At Risk</div>
        <div class="subnav-tab" data-tab="trending">Trending</div>
        <span class="role-badge rb-admin" style="margin-left:auto;margin-right:12px">Admin</span>
      </div>

      <!-- STAT STRIP -->
      <div class="stat-strip" id="statStrip">
        <div class="stat-chip active-chip" onclick="switchTab('outstanding')" title="Outstanding A/R">
          <div class="s-icon si-muted"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="width:14px;height:14px"><line x1="8" y1="1.5" x2="8" y2="14.5"/><path d="M11 4.5H6.5a2 2 0 0 0 0 4h3a2 2 0 0 1 0 4H5"/></svg></div>
          <div class="s-data"><div class="s-val s-navy" id="kpiAR">—</div><div class="s-lbl">Outstanding A/R</div></div>
        </div>
        <div class="stat-chip" onclick="switchTab('outstanding','overdue')" title="Overdue invoices">
          <div class="s-icon si-red"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="width:14px;height:14px"><circle cx="8" cy="8" r="5.5"/><line x1="8" y1="5" x2="8" y2="8.5"/><circle cx="8" cy="11" r=".5" fill="currentColor" stroke="none"/></svg></div>
          <div class="s-data"><div class="s-val s-red" id="kpiOverdue">—</div><div class="s-lbl">Overdue</div></div>
        </div>
        <div class="stat-chip" style="cursor:default" title="Average days to payment">
          <div class="s-icon si-amber"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="width:14px;height:14px"><circle cx="8" cy="8" r="6"/><path d="M8 4.5v3.5l2.5 1.5"/></svg></div>
          <div class="s-data"><div class="s-val s-amber" id="kpiAging">—</div><div class="s-lbl">Avg Days to Pay</div></div>
        </div>
        <div class="stat-chip" onclick="switchTab('drafts')" title="Draft invoices">
          <div class="s-icon si-amber"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="width:14px;height:14px"><path d="M11 2.5a1.5 1.5 0 0 1 2.12 0l.38.38a1.5 1.5 0 0 1 0 2.12L6 12.5 2.5 13.5 3.5 10z"/></svg></div>
          <div class="s-data"><div class="s-val s-amber" id="kpiDrafts">—</div><div class="s-lbl">Drafts</div></div>
        </div>
        <div class="stat-chip" onclick="switchTab('hold')" title="Clients on hold">
          <div class="s-icon si-red"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="width:14px;height:14px"><circle cx="8" cy="8" r="5.5"/><line x1="5" y1="8" x2="11" y2="8"/></svg></div>
          <div class="s-data"><div class="s-val s-red" id="kpiHold">—</div><div class="s-lbl">On Hold</div></div>
        </div>
        <div class="stat-chip" onclick="switchTab('payments')" title="Paid this month">
          <div class="s-icon si-green"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="width:14px;height:14px"><polyline points="12 5 7 11 4 8"/></svg></div>
          <div class="s-data"><div class="s-val s-green" id="kpiPaid">—</div><div class="s-lbl">Paid MTD</div></div>
        </div>
        <div class="stat-chip" style="cursor:default" title="Days Sales Outstanding">
          <div class="s-icon si-blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
          <div class="s-data"><div class="s-val s-blue" id="kpiDSO">42d</div><div class="s-lbl">DSO</div></div>
        </div>
        <div class="stat-chip" style="cursor:default" title="Revenue Month-to-Date">
          <div class="s-icon si-green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></div>
          <div class="s-data"><div class="s-val s-green" id="kpiRevMTD">$61,750</div><div class="s-lbl">Revenue MTD</div></div>
        </div>
      </div>

      <!-- REVENUE WATERFALL -->
      <div id="waterfallWrap" style="padding:6px 20px 0;background:#fff;border-bottom:1px solid var(--border);display:none">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px">
          <span style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">REVENUE FLOW</span>
          <span id="wfLegendInv" style="font-size:10px;color:var(--navy);font-weight:600"></span>
          <span id="wfLegendPaid" style="font-size:10px;color:var(--green);font-weight:600"></span>
          <span id="wfLegendOut" style="font-size:10px;color:var(--warning);font-weight:600"></span>
          <span id="wfLegendRisk" style="font-size:10px;color:var(--red);font-weight:600"></span>
        </div>
        <div class="waterfall-bar" id="waterfallBar" style="margin:0 0 6px"></div>
      </div>

      <!-- FILTER -->
      <div class="filter-row" id="filterRow">
        <div class="filter-left">
          <input class="inp" id="filterSearch" placeholder="Search invoices…" style="width:260px"/>
          <select class="inp" id="filterStatus" style="width:150px;cursor:pointer">
            <option value="">All Statuses</option>
            <option>Current</option><option>Unpaid</option><option>Past Due</option><option>Overdue</option><option>Paid</option>
          </select>
          <select class="inp" id="filterClient" style="width:180px;cursor:pointer">
            <option value="">All Clients</option>
          </select>
        </div>
        <button class="btn btn-outline btn-sm" onclick="exportTableCSV('finTableWrap','financial-export')" title="Export to CSV" style="margin-right:6px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          Export
        </button>
        <button class="btn btn-navy" id="btnNewInvoice">+ New Invoice</button>
      </div>

      <!-- AT RISK TOOLBAR -->
      <div class="toolbar-row" id="atriskToolbar" style="display:none">
        <label><input type="checkbox" checked data-expense="outsource"/> Outsource</label>
        <label><input type="checkbox" checked data-expense="gpo"/> GPO</label>
        <label><input type="checkbox" checked data-expense="inventory"/> Inventory</label>
        <label><input type="checkbox" checked data-expense="commissions"/> Commissions</label>
        <label><input type="checkbox" checked data-expense="shipping"/> Shipping</label>
        <label><input type="checkbox" checked data-expense="labor"/> Labor</label>
        <div class="toolbar-sep"></div>
        <label>Min Invoices <input class="inp" type="number" id="arMinInvoices" value="1" min="0" style="width:60px"/></label>
        <div class="toolbar-sep"></div>
        <label>Summary By
          <select class="inp" id="arSummaryBy" style="width:140px;cursor:pointer">
            <option value="department">Department</option>
            <option value="client">Client</option>
            <option value="salesrep">Sales Rep</option>
          </select>
        </label>
        <div class="toolbar-sep"></div>
        <input class="inp" id="arSearch" placeholder="Search…" style="width:200px"/>
      </div>

      <!-- TRENDING TOOLBAR -->
      <div class="toolbar-row" id="trendingToolbar" style="display:none">
        <label>Date From <input class="inp" type="date" id="trDateFrom" style="width:150px"/></label>
        <label>Date To <input class="inp" type="date" id="trDateTo" style="width:150px"/></label>
        <div class="toolbar-sep"></div>
        <input class="inp" id="trRepairDetail" placeholder="Repair Detail…" style="width:160px"/>
        <input class="inp" id="trClient" placeholder="Client…" style="width:160px"/>
        <input class="inp" id="trDepartment" placeholder="Department…" style="width:160px"/>
        <div class="toolbar-sep"></div>
        <button class="btn btn-navy" id="btnTrSearch" onclick="filterTrending()">Search</button>
      </div>

      <div id="skFinancial" style="padding:4px 12px"></div>
      <!-- TABLE -->
      <div class="tbl-wrap" id="finTableWrap">
        <table>
          <thead id="dataHead">
            <tr>
              <th>Invoice #</th>
              <th>Client</th>
              <th style="text-align:right">Amount</th>
              <th>Issued</th>
              <th>Due Date</th>
              <th style="text-align:right">Aging</th>
              <th>Status</th>
              <th style="width:80px"></th>
            </tr>
          </thead>
          <tbody id="dataBody"></tbody>
        </table>
      </div>
      <!-- PAGINATION -->
      <div id="paginationRow" style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;font-size:12px;color:var(--muted)">
        <div style="display:flex;align-items:center;gap:8px">
          <label style="font-weight:500">Rows per page:</label>
          <select class="inp" id="pageSizeSelect" style="width:70px;cursor:pointer;font-size:12px">
            <option value="25">25</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
          </select>
        </div>
        <span id="pageInfo">—</span>
        <div style="display:flex;gap:4px">
          <button class="edit-btn" id="btnPrev" style="padding:4px 10px" disabled>← Prev</button>
          <button class="edit-btn" id="btnNext" style="padding:4px 10px" disabled>Next →</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="shell.js"></script>
<script src="api.js"></script>
<script src="js/export-utils.js"></script>
<script>
(function() {
  'use strict';

  // ── Auth guard ──────────────────────────────────────────
  if (!API.requireAuth()) throw new Error('redirect');

  // ── State ───────────────────────────────────────────────
  let activeTab = 'outstanding';
  let rows = [];
  let isLive = false;
  let searchTimer = null;
  let currentPage = 1;
  let pageSize = 50;
  let sortCol = 'dblTranAmount';
  let sortDir = 'desc';

  // ── DOM refs ────────────────────────────────────────────
  const body      = document.getElementById('dataBody');
  const head      = document.getElementById('dataHead');
  const badge     = document.getElementById('dataBadge');
  const filterSearch = document.getElementById('filterSearch');
  const filterStatus = document.getElementById('filterStatus');
  const filterClient = document.getElementById('filterClient');
  const filterRow    = document.getElementById('filterRow');
  const pageSizeSelect = document.getElementById('pageSizeSelect');
  const pageInfo   = document.getElementById('pageInfo');
  const btnPrev    = document.getElementById('btnPrev');
  const btnNext    = document.getElementById('btnNext');
  const paginationRow = document.getElementById('paginationRow');

  // ── Helpers ─────────────────────────────────────────────
  function fmt$(v) { return '$' + Number(v || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function fmtDate(d) { if (!d) return '—'; const dt = new Date(d); return isNaN(dt) ? '—' : dt.toLocaleDateString('en-US', { month: '2-digit', day: '2-digit', year: 'numeric' }); }
  function agingDays(d) { if (!d) return 0; const dt = new Date(d); return isNaN(dt) ? 0 : Math.max(0, Math.round((Date.now() - dt) / 86400000)); }
  function esc(s) { const el = document.createElement('span'); el.textContent = s || ''; return el.innerHTML; }

  function statusBadge(st) {
    const s = (st || '').toLowerCase();
    if (s.includes('paid') && !s.includes('un'))     return '<span class="badge b-complete">Paid</span>';
    if (s.includes('partial'))                        return '<span class="badge b-pending">Partial</span>';
    if (s.includes('overdue') || s.includes('past'))  return '<span class="badge b-overdue">Overdue</span>';
    if (s.includes('current'))                        return '<span class="badge b-complete">Current</span>';
    if (s.includes('draft'))                          return '<span class="badge b-draft">Draft</span>';
    if (s.includes('hold'))                           return '<span class="badge b-hold">On Hold</span>';
    return '<span class="badge b-overdue">Unpaid</span>';
  }

  function agingColor(days) {
    if (days > 30) return 'color:var(--red);font-weight:700';
    if (days > 14) return 'color:var(--amber);font-weight:600';
    return 'color:var(--muted)';
  }

  function amtColor(status) {
    const s = (status || '').toLowerCase();
    if (s.includes('paid') && !s.includes('un')) return 'var(--green)';
    if (s.includes('overdue') || s.includes('past')) return 'var(--red)';
    return 'var(--navy)';
  }

  // ── Unwrap API response ─────────────────────────────────
  function unwrap(data) {
    if (Array.isArray(data)) return data;
    if (data && Array.isArray(data.dataSource)) return data.dataSource;
    if (data && Array.isArray(data.data)) return data.data;
    return [];
  }

  // Derive status from aging days (not from a broken ternary)
  function deriveStatus(r) {
    if (r.bPaid) return 'Paid';
    if (r.bIsVoid || r.bVoid) return 'Void';
    const days = agingDays(r.dtDueDate || r.dtTranDate || r.dtInvoiceDate);
    if (days > 90) return 'Overdue';
    if (days > 60) return 'Past Due';
    if (days > 0)  return 'Unpaid';
    return 'Current';
  }

  // Normalize API field names
  function normalizeFinancialRow(r) {
    // Invoice number: prefer sInvoiceNumber (from GP staging), fall back to sTranNumber (WO number)
    r.sInvoiceNumber = r.sInvoiceNumber || r.sTranNumber || '';
    // Amount: prefer TotalAmountDue (GP staging enriched), then dblInvoiceTotal, then dblTranAmount
    var amt = Number(r.TotalAmountDue || r.dblInvoiceTotal || r.dblTranAmount || r.dblAmount || r.dblInvoiceAmount || 0);
    r.dblTranAmount  = amt;
    r.dtTranDate     = r.dtTranDate     || r.dtIssuedDate  || r.dtInvoiceDate    || null;
    // Derive status from aging — never use the broken always-Unpaid ternary
    r.sStatus        = deriveStatus(r);
    r.dblTaxAmount   = r.dblTaxAmount   || r.dblTax || r.dblAmtTax || 0;
    r.dblDiscount    = r.dblDiscount    || r.dblDiscountAmount || 0;
    r.sPaymentTerms  = r.sPaymentTerms  || r.sTermsDesc || r.sTerms || '';
    r.sGLAccountNumber = r.sGLAccountNumber || r.sGLAccount || r.GLAccount || '';
    r.sDeliveryMethod  = r.sDeliveryMethod  || r.sDeliveryDesc || r.sInvoiceDeliveryMethod || '';
    r.sGreatPlainsID   = r.sGreatPlainsID   || r.sGPID || '';
    // Compute aging days for sorting/display
    r.aging = agingDays(r.dtDueDate || r.dtTranDate || r.dtInvoiceDate);
    return r;
  }

  // ── Sortable header builder ─────────────────────────────
  function sortTh(label, colKey, align) {
    const arrow = sortCol === colKey ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '';
    const style = (align ? 'text-align:' + align + ';' : '') + 'cursor:pointer;user-select:none';
    return '<th style="' + style + '" onclick="toggleSort(\'' + colKey + '\')">' + label + arrow + '</th>';
  }

  function buildHeaders(tab) {
    switch (tab) {
      case 'outstanding': return '<tr>' + sortTh('Invoice #','sInvoiceNumber') + sortTh('Client','sClientName1') + sortTh('Amount','dblTranAmount','right') + sortTh('Tax','dblTaxAmount','right') + sortTh('Discount','dblDiscount','right') + sortTh('Terms','sPaymentTerms') + sortTh('GL Acct','sGLAccountNumber') + sortTh('Issued','dtTranDate') + sortTh('Due Date','dtDueDate') + sortTh('Aging','aging','right') + sortTh('Status','sStatus') + '<th style="width:80px"></th></tr>';
      case 'drafts': return '<tr>' + sortTh('Invoice #','sInvoiceNumber') + sortTh('Client','sClientName1') + sortTh('Amount','dblTranAmount','right') + sortTh('Created','dtTranDate') + sortTh('Delivery','sDeliveryMethod') + sortTh('GP ID','sGreatPlainsID') + '<th>Status</th><th style="width:80px"></th></tr>';
      case 'hold': return '<tr>' + sortTh('Client','sClientName1') + sortTh('Department','sDepartmentName') + sortTh('On Hold Since','dtOnHoldDate') + sortTh('Reason','sReason') + '<th style="width:100px"></th></tr>';
      case 'payments': return '<tr>' + sortTh('Invoice #','sInvoiceNumber') + sortTh('Client','sClientName1') + sortTh('Amount','dblTranAmount','right') + sortTh('Payment Date','dtPaymentDate') + sortTh('Method','sPaymentMethod') + '<th style="width:80px"></th></tr>';
      case 'gl': return '<tr>' + sortTh('Account #','sAccountNumber') + sortTh('Account Name','sAccountName') + sortTh('Type','sType') + sortTh('Description','sDescription') + '<th style="width:80px"></th></tr>';
      case 'atrisk': return '<tr>' + sortTh('Name','sName') + sortTh('Total Revenue','dblRevenue','right') + sortTh('Total Expenses','dblExpenses','right') + sortTh('Profit Margin','dblMargin','right') + sortTh('Invoices','nInvoices','right') + sortTh('Risk Level','sRisk') + '</tr>';
      case 'trending': return '<tr><th>Period</th><th style="text-align:right">Repairs In</th><th style="text-align:right">Repairs Out</th><th style="text-align:right">Avg TAT</th><th style="text-align:right">Revenue</th><th style="text-align:right">Expenses</th><th style="text-align:right">Margin %</th></tr>';
      default: return '';
    }
  }

  // ── Demo data sets ──────────────────────────────────────
  const DEMO = {
    outstanding: [
      { sTranNumber:'INV-2026-0284', sClientName1:'88th Medical Group', dblTranAmount:2840, dblTaxAmount:212.14, dblDiscount:0, sPaymentTerms:'Net 30', sGLAccountNumber:'4000', dtTranDate:'2026-02-25', dtDueDate:'2026-03-25', sStatus:'Unpaid', lInvoiceKey:284 },
      { sTranNumber:'INV-2026-0271', sClientName1:'Tift Regional Medical Center', dblTranAmount:5120, dblTaxAmount:383.22, dblDiscount:256, sPaymentTerms:'Net 30', sGLAccountNumber:'4000', dtTranDate:'2026-02-18', dtDueDate:'2026-03-18', sStatus:'Unpaid', lInvoiceKey:271 },
      { sTranNumber:'INV-2026-0258', sClientName1:'Nashville General Hospital', dblTranAmount:3650, dblTaxAmount:273.06, dblDiscount:0, sPaymentTerms:'Net 30', sGLAccountNumber:'4000', dtTranDate:'2026-02-10', dtDueDate:'2026-03-10', sStatus:'Partial', lInvoiceKey:258 },
      { sTranNumber:'INV-2026-0241', sClientName1:'West Side GI Center', dblTranAmount:9300, dblTaxAmount:695.82, dblDiscount:465, sPaymentTerms:'Net 30', sGLAccountNumber:'4000', dtTranDate:'2026-01-31', dtDueDate:'2026-03-01', sStatus:'Overdue', lInvoiceKey:241 },
      { sTranNumber:'INV-2026-0229', sClientName1:'Northside Hospital', dblTranAmount:4480, dblTaxAmount:335.30, dblDiscount:0, sPaymentTerms:'Net 30', sGLAccountNumber:'4000', dtTranDate:'2026-01-22', dtDueDate:'2026-02-21', sStatus:'Paid', lInvoiceKey:229 },
      { sTranNumber:'INV-2026-0215', sClientName1:'Metro Health Hospital', dblTranAmount:2100, dblTaxAmount:157.08, dblDiscount:105, sPaymentTerms:'Net 30', sGLAccountNumber:'4100', dtTranDate:'2026-01-15', dtDueDate:'2026-02-14', sStatus:'Paid', lInvoiceKey:215 },
      { sTranNumber:'INV-2026-0198', sClientName1:'Shreveport Endoscopy Center', dblTranAmount:1750, dblTaxAmount:130.90, dblDiscount:0, sPaymentTerms:'Net 45', sGLAccountNumber:'4000', dtTranDate:'2026-01-08', dtDueDate:'2026-02-07', sStatus:'Overdue', lInvoiceKey:198 }
    ],
    drafts: [
      { sTranNumber:'DRF-2026-0050', sClientName1:'88th Medical Group', dblTranAmount:1200, dtCreatedDate:'2026-03-05', sDeliveryMethod:'Email', sGreatPlainsID:'GP-88MED-001', sStatus:'Draft', lInvoiceKey:50 },
      { sTranNumber:'DRF-2026-0049', sClientName1:'Nashville General Hospital', dblTranAmount:3400, dtCreatedDate:'2026-03-02', sDeliveryMethod:'Print', sGreatPlainsID:'GP-NASH-014', sStatus:'Draft', lInvoiceKey:49 }
    ],
    hold: [
      { sClientName1:'West Side GI Center', sDepartmentName:'Endoscopy', dtOnHoldDate:'2026-02-15', sReason:'Past due > 60 days', lClientKey:41 },
      { sClientName1:'Shreveport Endoscopy Center', sDepartmentName:'GI Lab', dtOnHoldDate:'2026-01-20', sReason:'Billing dispute', lClientKey:55 }
    ],
    payments: [

  // ── Load data per tab ───────────────────────────────────
  async function loadTab(tab) {
    activeTab = tab;
    currentPage = 1;
    // Default sort: Outstanding by amount desc, others unsorted
    sortCol = (tab === 'outstanding') ? 'dblTranAmount' : null;
    sortDir = (tab === 'outstanding') ? 'desc' : 'asc';
    head.innerHTML = buildHeaders(tab);

    // Show/hide filters and toolbars based on tab
    var showFilters = (tab === 'outstanding' || tab === 'drafts' || tab === 'payments');
    filterRow.style.display = showFilters ? '' : 'none';
    document.getElementById('atriskToolbar').style.display = (tab === 'atrisk') ? '' : 'none';
    document.getElementById('trendingToolbar').style.display = (tab === 'trending') ? '' : 'none';

    // Update active chip highlight
    document.querySelectorAll('.stat-chip').forEach(c => c.classList.remove('active-chip'));
    const chipMap = { outstanding: 0, drafts: 3, hold: 4, payments: 5, gl: -1 };
    const idx = chipMap[tab]; if (idx >= 0) document.querySelectorAll('.stat-chip')[idx]?.classList.add('active-chip');

    // Reset filters on tab switch
    filterSearch.value = '';
    filterStatus.value = '';
    filterClient.value = '';

    body.innerHTML = '<tr><td colspan="12" style="text-align:center;padding:24px;color:var(--muted)">Loading...</td></tr>';

    try {
      let raw;
      const pg = { Pagination: { PageNumber: 1, PageSize: 200 }, Filters: {} };
      // At Risk and Trending use local demo data only (no API endpoint)
      if (tab === 'atrisk' || tab === 'trending') {
        rows = DEMO[tab] || [];
        isLive = false;
        API.UI.updateDemoBadge('demo');
        if (tab === 'atrisk') { renderAtRisk(); return; }
        if (tab === 'trending') { renderTrending(); return; }
      }

      switch (tab) {
        case 'outstanding': raw = await API.getOutstandingInvoices(pg); break;
        case 'drafts':      raw = await API.getDraftInvoices(pg); break;
        case 'hold':        raw = await API.getClientsOnHold(pg); break;
        case 'payments':    raw = await API.getInvoicePayments(pg); break;
        case 'gl':          raw = await API.getGLAccounts(); break;
      }
      rows = unwrap(raw).map(normalizeFinancialRow);
      isLive = true;
      API.UI.updateDemoBadge('api');
      if (tab === 'outstanding') updateFinancialKPIs(rows);
    } catch (e) {
      console.warn('[TSI Financial] API unavailable, using demo data:', e.message);
      rows = DEMO[tab] || [];
      isLive = false;
      API.UI.updateDemoBadge('demo');
      // For atrisk/trending, use dedicated renderers
      if (tab === 'atrisk') { renderAtRisk(); return; }
      if (tab === 'trending') { renderTrending(); return; }
    }

    populateClientFilter();
    renderRows();
  }

  // ── Update financial KPI chips ──────────────────────────
  async function updateFinancialKPIs(liveOutstanding) {
    const inv = liveOutstanding || DEMO.outstanding;
    const open = inv.filter(r => { const s = (r.sStatus || '').toLowerCase(); return s !== 'paid' && s !== 'current'; });
    const overdue = inv.filter(r => { const s = (r.sStatus || '').toLowerCase(); return s.includes('overdue') || s.includes('past'); });

    const totalAR = open.reduce((s, r) => s + Number(r.dblTranAmount || 0), 0);

    let totalAgingDays = 0, agingCount = 0;
    open.forEach(r => {
      const d = r.aging || agingDays(r.dtDueDate || r.dtTranDate);
      if (d > 0) { totalAgingDays += d; agingCount++; }
    });

    document.getElementById('kpiAR').textContent = fmt$(totalAR);
    document.getElementById('kpiOverdue').textContent = String(overdue.length);
    document.getElementById('kpiAging').textContent = agingCount ? Math.round(totalAgingDays / agingCount) + 'd' : '0d';

    // Load drafts, hold, payments counts independently
    const pg = { Pagination: { PageNumber: 1, PageSize: 200 }, Filters: {} };
    let draftsCount, holdCount, totalPaid;
    try {
      const [draftsRaw, holdRaw, paymentsRaw] = await Promise.all([
        API.getDraftInvoices(pg).catch(() => null),
        API.getClientsOnHold(pg).catch(() => null),
        API.getInvoicePayments(pg).catch(() => null)
      ]);
      draftsCount = draftsRaw ? unwrap(draftsRaw).length : DEMO.drafts.length;
      holdCount = holdRaw ? unwrap(holdRaw).length : DEMO.hold.length;
      const payments = paymentsRaw ? unwrap(paymentsRaw) : DEMO.payments;
      totalPaid = payments.reduce((s, r) => s + Number(r.dblTranAmount || r.dblPaymentAmount || r.dblAmount || 0), 0);
    } catch (e) {
      draftsCount = DEMO.drafts.length;
      holdCount = DEMO.hold.length;
      totalPaid = DEMO.payments.reduce((s, r) => s + Number(r.dblTranAmount || r.dblPaymentAmount || r.dblAmount || 0), 0);
    }
    document.getElementById('kpiDrafts').textContent = String(draftsCount);
    document.getElementById('kpiHold').textContent = String(holdCount);
    document.getElementById('kpiPaid').textContent = fmt$(totalPaid);
  }

  // ── Filter logic ────────────────────────────────────────
  function getFiltered() {
    const q = (filterSearch.value || '').toLowerCase();
    const st = (filterStatus.value || '').toLowerCase();
    const cl = filterClient.value || '';
    return rows.filter(r => {
      const name = (r.sClientName1 || r.sClientName || '').toLowerCase();
      const inv = (r.sInvoiceNumber || r.sTranNumber || r.sAccountNumber || r.sAccountName || '').toLowerCase();
      const status = (r.sStatus || '').toLowerCase();
      if (q && !name.includes(q) && !inv.includes(q)) return false;
      if (st && !status.includes(st)) return false;
      if (cl && (r.sClientName1 || r.sClientName || '') !== cl) return false;
      return true;
    });
  }

  // ── Sorting ─────────────────────────────────────────────
  function sortData(data) {
    if (!sortCol) return data;
    var col = sortCol, dir = sortDir;
    return data.slice().sort(function(a, b) {
      var va = a[col], vb = b[col];
      // Numeric sort for known numeric fields
      if (typeof va === 'number' || typeof vb === 'number') {
        va = Number(va || 0); vb = Number(vb || 0);
        return dir === 'asc' ? va - vb : vb - va;
      }
      // Date sort
      if (col.startsWith('dt')) {
        va = va ? new Date(va).getTime() : 0;
        vb = vb ? new Date(vb).getTime() : 0;
        return dir === 'asc' ? va - vb : vb - va;
      }
      // String sort
      va = String(va || '').toLowerCase();
      vb = String(vb || '').toLowerCase();
      return dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    });
  }

  // ── Pagination helpers ────────────────────────────────
  var PAGINATED_TABS = { outstanding: true, drafts: true, payments: true };

  function updatePagination(totalRows) {
    if (!PAGINATED_TABS[activeTab]) {
      paginationRow.style.display = 'none';
      return;
    }
    paginationRow.style.display = '';
    var totalPages = Math.max(1, Math.ceil(totalRows / pageSize));
    if (currentPage > totalPages) currentPage = totalPages;
    var start = (currentPage - 1) * pageSize + 1;
    var end = Math.min(currentPage * pageSize, totalRows);
    pageInfo.textContent = totalRows ? ('Showing ' + start + '–' + end + ' of ' + totalRows.toLocaleString()) : 'No records';
    btnPrev.disabled = (currentPage <= 1);
    btnNext.disabled = (currentPage >= totalPages);
  }

  function paginate(data) {
    if (!PAGINATED_TABS[activeTab]) return data;
    var start = (currentPage - 1) * pageSize;
    return data.slice(start, start + pageSize);
  }

  // ── Render rows ─────────────────────────────────────────

    // Rebuild headers to show sort arrows
    head.innerHTML = buildHeaders(activeTab);

    const allData = sortData(getFiltered());
    if (!allData.length) {
      body.innerHTML = '<tr><td colspan="12" style="text-align:center;padding:24px;color:var(--muted)">No records found</td></tr>';
      updatePagination(0);
      return;
    }

    updatePagination(allData.length);
    var data = paginate(allData);

    switch (activeTab) {
      case 'outstanding': renderOutstanding(data); break;
      case 'drafts':      renderDrafts(data); break;
      case 'hold':        renderHold(data); break;
      case 'payments':    renderPayments(data); break;
      case 'gl':          renderGL(data); break;
      case 'atrisk':      renderAtRisk(); break;
      case 'trending':    renderTrending(); break;
    }
  }

  function filterAtRiskData() {
    var q = (document.getElementById('arSearch').value || '').toLowerCase();
    var minInv = parseInt(document.getElementById('arMinInvoices').value, 10) || 0;
    var summaryBy = document.getElementById('arSummaryBy').value || 'department';
    var checkedExpenses = [];
    document.querySelectorAll('#atriskToolbar input[data-expense]').forEach(function(cb) {
      if (cb.checked) checkedExpenses.push(cb.getAttribute('data-expense'));
    });

    var rawData = (DEMO.atrisk || []).slice();

    // Group by selected dimension
    if (summaryBy !== 'department') {
      var groups = {};
      rawData.forEach(function(r) {
        var key;
        if (summaryBy === 'client') {
          // Extract client name (after " – " in the sName field)
          var parts = r.sName.split(' – ');
          key = parts.length > 1 ? parts[parts.length - 1].trim() : r.sName;
        } else if (summaryBy === 'salesrep') {
          // Group by a simulated sales rep based on the name hash
          var repNames = ['Brian Kenney', 'Dan Hightower', 'Joe Rygiel', 'Account House'];
          key = repNames[Math.abs(r.sName.length) % repNames.length];
        } else {
          key = r.sName;
        }
        if (!groups[key]) {
          groups[key] = { sName: key, dblRevenue: 0, dblExpenses: 0, nInvoices: 0, expenses: { outsource:0, gpo:0, inventory:0, commissions:0, shipping:0, labor:0 } };
        }
        var g = groups[key];
        g.dblRevenue += r.dblRevenue;
        g.dblExpenses += r.dblExpenses;
        g.nInvoices += r.nInvoices;
        if (r.expenses) {
          ['outsource','gpo','inventory','commissions','shipping','labor'].forEach(function(cat) {
            g.expenses[cat] += (r.expenses[cat] || 0);
          });
        }
      });
      rawData = Object.values(groups).map(function(g) {
        g.dblMargin = g.dblRevenue > 0 ? ((g.dblRevenue - g.dblExpenses) / g.dblRevenue) * 100 : 0;
        g.sRisk = g.dblMargin < 0 ? 'High Risk' : (g.dblMargin < 10 ? 'Moderate' : 'Low');
        return g;
      });
    }

    return rawData.filter(function(r) {
      if (q && r.sName.toLowerCase().indexOf(q) === -1) return false;
      if (r.nInvoices < minInv) return false;
      // Recalculate expenses based on checked categories
      if (r.expenses) {
        var filteredExp = 0;
        checkedExpenses.forEach(function(cat) { filteredExp += (r.expenses[cat] || 0); });
        r._filteredExpenses = filteredExp;
        r._filteredRevenue = r.dblRevenue;
        r._filteredMargin = r._filteredRevenue > 0 ? ((r._filteredRevenue - filteredExp) / r._filteredRevenue) * 100 : 0;
      }
      return true;
    });
  }

        '<td style="text-align:right;' + marginStyle + '">' + r.dblMarginPct.toFixed(2) + '%</td>' +
        '</tr>';
    }).join('');
  }

  function filterTrendingData() {
    var dateFrom = document.getElementById('trDateFrom').value;
    var dateTo = document.getElementById('trDateTo').value;
    var repairQ = (document.getElementById('trRepairDetail').value || '').toLowerCase();
    var clientQ = (document.getElementById('trClient').value || '').toLowerCase();
    var deptQ = (document.getElementById('trDepartment').value || '').toLowerCase();

    var data = (DEMO.trending || []).slice();
    // Date filtering: parse period "Mon YYYY" to approximate date
    var MONTHS = { 'jan':0,'feb':1,'mar':2,'apr':3,'may':4,'jun':5,'jul':6,'aug':7,'sep':8,'oct':9,'nov':10,'dec':11 };
    return data.filter(function(r) {
      if (dateFrom || dateTo) {
        var parts = r.sPeriod.split(' ');
        var mIdx = MONTHS[(parts[0] || '').toLowerCase().substring(0, 3)];
        var yr = parseInt(parts[1], 10);
        if (!isNaN(mIdx) && !isNaN(yr)) {
          var periodDate = new Date(yr, mIdx, 1);
          if (dateFrom && periodDate < new Date(dateFrom)) return false;
          if (dateTo && periodDate > new Date(dateTo)) return false;
        }
      }
      // Text filters are placeholders for future API integration; demo data has no client/dept/detail fields
      return true;
    });
  }

  window.filterTrending = function() {
    renderTrending();
  };

  // ── Global: switch tab from chip click ──────────────────
  window.switchTab = function(tab, filter) {
    document.querySelectorAll('.subnav-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === tab);
    });
    loadTab(tab);
    if (filter === 'overdue') {
      setTimeout(() => { filterStatus.value = 'Overdue'; renderRows(); }, 50);
    }
  };

  // ── Sorting handler ─────────────────────────────────────
  window.toggleSort = function(col) {
    if (sortCol === col) {
      sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      sortCol = col;
      sortDir = 'asc';
    }
    currentPage = 1;
    renderRows();
  };

  // ── Pagination handlers ────────────────────────────────
  pageSizeSelect.addEventListener('change', function() {
    pageSize = parseInt(this.value, 10) || 50;
    currentPage = 1;
    renderRows();
  });
  btnPrev.addEventListener('click', function() {
    if (currentPage > 1) { currentPage--; renderRows(); }
  });
  btnNext.addEventListener('click', function() {
    currentPage++;
    renderRows();
  });

  // ── + New Invoice button ──────────────────────────────
  document.getElementById('btnNewInvoice').addEventListener('click', function() {
    alert('Create Invoice: Select a completed repair from the Work Orders page to generate an invoice. Invoices are created from the repair workflow (Repair → Draft Invoice → Finalize).');
  });

  // ── Global action stubs ─────────────────────────────────
  window.viewInvoice = function(key) {
    // Find the invoice row
    var inv = rows.find(function(r) { return r.lInvoiceKey === key; });
    if (!inv) { console.warn('Invoice not found:', key); return; }

    // Build detail modal
    var overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(var(--primary-rgb),.3);z-index:var(--z-modal);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)';
    overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });

    var amt = Number(inv.dblTranAmount || 0);
    var tax = Number(inv.dblTaxAmount || 0);
    var disc = Number(inv.dblDiscount || 0);
    var total = amt + tax - disc;

    var html = '<div style="background:#fff;border-radius:var(--radius-xl);width:520px;max-height:80vh;overflow-y:auto;box-shadow:var(--shadow-modal)">';
    html += '<div style="background:var(--navy);color:#fff;padding:16px 20px;border-radius:12px 12px 0 0;display:flex;justify-content:space-between;align-items:center">';
    html += '<div style="font-weight:700;font-size:15px">Invoice Detail</div>';
    html += '<button onclick="this.closest(\'div[style*=fixed]\').remove()" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer">×</button></div>';
    html += '<div style="padding:20px">';
    html += '<table style="width:100%;font-size:13px;border-collapse:collapse">';
    var fields = [
      ['Invoice #', inv.sInvoiceNumber || inv.sTranNumber],
      ['WO #', inv.sWorkOrderNumber || inv.sTranNumber || '—'],
      ['Client', inv.sClientName1 || inv.sClientName || '—'],
      ['Status', inv.sStatus || '—'],
      ['Issued', fmtDate(inv.dtTranDate || inv.dtInvoiceDate)],
      ['Due Date', fmtDate(inv.dtDueDate)],
      ['Amount', fmt$(amt)],
      ['Tax', fmt$(tax)],
      ['Discount', fmt$(disc)],
      ['Total Due', fmt$(total)],
      ['Terms', inv.sPaymentTerms || '—'],
      ['GL Account', inv.sGLAccountNumber || '—'],
      ['PO #', inv.sPurchaseOrder || '—'],
      ['Delivery', inv.sDeliveryMethod || inv.sDeliveryDesc || '—'],
      ['Contract', inv.sUnderContract === 'Y' ? 'Yes' : 'No'],
      ['Bill To', [inv.sBillName1, inv.sBillAddr1, inv.sBillCity, inv.sBillState, inv.sBillZip].filter(Boolean).join(', ') || '—'],
      ['Ship To', [inv.sShipName1, inv.sShipAddr1, inv.sShipCity, inv.sShipState, inv.sShipZip].filter(Boolean).join(', ') || '—']
    ];
    fields.forEach(function(f) {
      html += '<tr><td style="padding:6px 8px;color:var(--muted);font-weight:500;width:120px;border-bottom:1px solid var(--border)">' + f[0] + '</td>';
      html += '<td style="padding:6px 8px;border-bottom:1px solid var(--border)">' + esc(String(f[1])) + '</td></tr>';
    });
    html += '</table></div></div>';
    overlay.innerHTML = html;
    document.body.appendChild(overlay);
  };
  window.deleteDraft = async function(btn, key) {
    if (!btn._confirming) {
      btn._confirming = true; btn._origText = btn.textContent; btn._origBg = btn.style.background;
      btn.textContent = 'Sure?'; btn.style.background = '#dc3545'; btn.style.color = '#fff';
      setTimeout(() => { if (btn._confirming) { btn._confirming = false; btn.textContent = btn._origText; btn.style.background = btn._origBg; btn.style.color = ''; } }, 3000);
      return;
    }
    btn._confirming = false; btn.textContent = btn._origText; btn.style.background = btn._origBg; btn.style.color = '';
    try { await API.deleteDraftInvoice(key); loadTab('drafts'); }
    catch (e) { console.warn('Delete failed:', e.message); }
  };
  window.releaseHold = async function(btn, clientKey) {
    if (!btn._confirming) {
      btn._confirming = true; btn._origText = btn.textContent; btn._origBg = btn.style.background;
      btn.textContent = 'Sure?'; btn.style.background = '#dc3545'; btn.style.color = '#fff';
      setTimeout(() => { if (btn._confirming) { btn._confirming = false; btn.textContent = btn._origText; btn.style.background = btn._origBg; btn.style.color = ''; } }, 3000);
      return;
    }
    btn._confirming = false; btn.textContent = btn._origText; btn.style.background = btn._origBg; btn.style.color = '';
    try { await API.clientUpdateOnHold({ plClientKey: clientKey, pbOnHold: false }); loadTab('hold'); }
    catch (e) { console.warn('Release failed:', e.message); }
  };
  window.editGL = function(key) {
  };

  // ── Wire sub-nav tabs ──────────────────────────────────
  document.querySelectorAll('.subnav-tab').forEach(tab => {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.subnav-tab').forEach(t => t.classList.remove('active'));
      this.classList.add('active');
      loadTab(this.dataset.tab);
    });
  });

  // ── Wire filters ───────────────────────────────────────
  filterSearch.addEventListener('input', function() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(function() { currentPage = 1; renderRows(); }, 200);
  });
  filterStatus.addEventListener('change', function() { currentPage = 1; renderRows(); });
  filterClient.addEventListener('change', function() { currentPage = 1; renderRows(); });

  // ── Wire At Risk toolbar ──────────────────────────────
  document.querySelectorAll('#atriskToolbar input[data-expense]').forEach(function(cb) {
    cb.addEventListener('change', function() { if (activeTab === 'atrisk') renderAtRisk(); });
  });
  document.getElementById('arMinInvoices').addEventListener('input', function() { if (activeTab === 'atrisk') renderAtRisk(); });
  document.getElementById('arSummaryBy').addEventListener('change', function() { if (activeTab === 'atrisk') renderAtRisk(); });
  var arSearchTimer = null;
  document.getElementById('arSearch').addEventListener('input', function() {
    clearTimeout(arSearchTimer);
    arSearchTimer = setTimeout(function() { if (activeTab === 'atrisk') renderAtRisk(); }, 200);
  });

  // ── Wire Trending toolbar ────────────────────────────
  document.getElementById('trDateFrom').addEventListener('change', function() { if (activeTab === 'trending') renderTrending(); });
  document.getElementById('trDateTo').addEventListener('change', function() { if (activeTab === 'trending') renderTrending(); });

  // ── Init ───────────────────────────────────────────────
  API.UI.init();
  if(API && API.UI) API.UI.showSkeleton('skFinancial', 5);
  updateFinancialKPIs();

  // FUTURE: needs Express endpoint for financial health waterfall
  if (false) {
    Promise.resolve(null).then(function(h) {
      if (!h) return;
      var wrap = document.getElementById('waterfallWrap');
      if (!wrap) return;
      wrap.style.display = '';
      var total = h.totalInvoiced || 1;
      var paidPct = Math.round((h.totalPaid / total) * 100);
      var outPct = Math.round((h.outstanding / total) * 100);
      var riskPct = Math.round((h.atRisk / total) * 100);
      var bar = document.getElementById('waterfallBar');
      bar.innerHTML = '<div class="waterfall-seg wf-paid" style="width:' + paidPct + '%" title="Paid">Paid</div>'
        + '<div class="waterfall-seg wf-outstanding" style="width:' + Math.max(outPct - riskPct, 1) + '%" title="Outstanding">Outstanding</div>'
        + '<div class="waterfall-seg wf-atrisk" style="width:' + Math.max(riskPct, 0) + '%" title="At Risk">' + (riskPct > 5 ? 'At Risk' : '') + '</div>';
      var fmt = function(n) { return '$' + Math.round(n).toLocaleString(); };
      document.getElementById('wfLegendInv').textContent = 'Invoiced: ' + fmt(h.totalInvoiced);
      document.getElementById('wfLegendPaid').textContent = 'Paid: ' + fmt(h.totalPaid);
      document.getElementById('wfLegendOut').textContent = 'Outstanding: ' + fmt(h.outstanding);
      document.getElementById('wfLegendRisk').textContent = 'At Risk: ' + fmt(h.atRisk);
    });
  }

  loadTab('outstanding').then(function() { if(API && API.UI) API.UI.hideSkeleton('skFinancial'); });

})();
</script>
