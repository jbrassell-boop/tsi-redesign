<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>My Workspace | TSI Redesign</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .page-body{overflow:auto;padding:0}

    /* ── Workspace Toolbar ── */
    .ws-toolbar{display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--card);border-bottom:1px solid var(--neutral-200);flex-shrink:0;position:sticky;top:0;z-index:10}
    .ws-title{font-size:14px;font-weight:800;color:var(--navy)}
    .ws-sub{font-size:11px;color:var(--muted);margin-left:6px}
    .ws-spacer{flex:1}

    /* ── Widget Grid ── */
    .ws-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:20px;align-items:start}

    /* ── Widget Card ── */
    .wc{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(var(--primary-rgb),.05);position:relative;transition:box-shadow .15s}
    .wc.span2{grid-column:span 2}
    .wc.span3{grid-column:span 3}
    .wc-head{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border);background:var(--neutral-50)}
    .wc-icon{font-size:14px;line-height:1}
    .wc-title{font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.04em;flex:1}
    .wc-action{font-size:10px;color:var(--blue);cursor:pointer;font-weight:600;white-space:nowrap}
    .wc-action:hover{text-decoration:underline}
    .wc-body{padding:12px 14px}

    /* ── Edit Mode ── */
    .ws-grid.edit-mode .wc{outline:2px dashed var(--border-dk);outline-offset:2px}
    .ws-grid.edit-mode .wc:hover{outline-color:var(--blue)}
    .wc-remove{display:none;position:absolute;top:6px;right:6px;width:20px;height:20px;background:var(--red);border:none;border-radius:50%;color:#fff;font-size:12px;line-height:1;cursor:pointer;align-items:center;justify-content:center;z-index:5;font-weight:700}
    .edit-mode .wc-remove{display:flex}
    .wc-drag{display:none;position:absolute;top:8px;left:8px;color:var(--muted);cursor:grab;font-size:13px}
    .edit-mode .wc-drag{display:block}

    /* Add-widget drop zone shown in edit mode */
    .wc-add-slot{border:2px dashed var(--border-dk);border-radius:10px;min-height:100px;display:none;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;background:transparent}
    .wc-add-slot:hover{border-color:var(--navy);background:var(--primary-light)}
    .edit-mode ~ .ws-add-btn,.edit-mode .wc-add-slot{display:flex}

    /* ── Widget Picker Panel ── */
    .picker-overlay{position:fixed;inset:0;background:rgba(var(--primary-rgb),.3);backdrop-filter:blur(2px);z-index:400;display:none}
    .picker-overlay.open{display:block}
    .drawer{top:0;bottom:0;z-index:var(--z-drawer);border-left:none;transition:transform .22s cubic-bezier(.4,0,.2,1)}
    .picker-head{background:var(--primary-dark);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .picker-head-title{font-size:14px;font-weight:800;color:#fff}
    .picker-close{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;width:28px;height:28px;border-radius:var(--radius-sm);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
    .picker-list{flex:1;overflow-y:auto;padding:12px}
    .picker-section{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:10px 0 6px}
    .picker-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:6px;cursor:pointer;transition:all .12s;background:var(--card)}
    .picker-item:hover{border-color:var(--navy);background:var(--primary-light)}
    .picker-item.added{opacity:.4;cursor:default;pointer-events:none}
    .pi-icon{font-size:16px;width:28px;text-align:center;flex-shrink:0}
    .pi-info{flex:1;min-width:0}
    .pi-title{font-size:12px;font-weight:700;color:var(--navy)}
    .pi-desc{font-size:10px;color:var(--muted);margin-top:1px}
    .pi-add{background:var(--navy);border:none;border-radius:4px;color:#fff;font-size:10px;font-weight:700;padding:3px 8px;cursor:pointer;flex-shrink:0}
    .picker-item.added .pi-add{background:var(--muted)}

    /* ── Stat rows (inside widgets) ── */
    .ws-stat{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:6px;margin-bottom:5px;cursor:pointer;transition:background .1s;border:1px solid var(--border)}
    .ws-stat:hover{background:#D1EAF0}
    .ws-stat:last-child{margin-bottom:0}
    .ws-stat-left{display:flex;align-items:center;gap:8px}
    .ws-stat-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
    .ws-stat-label{font-size:12px;color:var(--label)}
    .ws-stat-val{font-size:15px;font-weight:800;color:var(--navy)}
    .ws-stat-val.red{color:var(--red)}
    .ws-stat-val.amber{color:var(--amber)}
    .ws-stat-val.green{color:var(--green)}
    .ws-stat-arrow{font-size:14px;color:var(--muted);margin-left:4px}

    /* ── Mini table ── */
    .ws-table{width:100%;border-collapse:collapse}
    .ws-table th{font-size:9.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:4px 8px;border-bottom:1.5px solid var(--border-dk);text-align:left}
    .ws-table td{padding:6px 8px;font-size:11.5px;border-bottom:1px solid var(--border);color:var(--text)}
    .ws-table tbody tr:last-child td{border-bottom:none}
    .ws-table tbody tr:hover td{background:#F0F8FF;cursor:pointer}
    .ws-tbl-code{font-weight:700;color:var(--navy);font-size:11px}
    .ws-tbl-badge{display:inline-flex;padding:1px 6px;border-radius:8px;font-size:9.5px;font-weight:600;border:1px solid transparent}
    /* b-* badge classes — now in shared styles.css */

    /* ── Tasks ── */
    .ws-task{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
    .ws-task:last-child{border-bottom:none}
    .ws-task-check{width:16px;height:16px;border-radius:var(--radius-sm);border:1.5px solid var(--border-dk);background:#fff;flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .ws-task-check.done{background:var(--green);border-color:var(--green);color:#fff;font-size:9px}
    .ws-task-text{font-size:12px;color:var(--text);flex:1;line-height:1.4}
    .ws-task-text.done{text-decoration:line-through;color:var(--muted)}
    .ws-task-pri{font-size:9.5px;font-weight:700;padding:1px 5px;border-radius:4px}
    .pri-u{background:#FEF2F2;color:var(--red)}.pri-h{background:#FFFBEB;color:var(--amber)}.pri-n{background:var(--neutral-50);color:var(--navy)}.pri-l{background:#F1F5F9;color:var(--muted)}

    /* ── Quick Links ── */
    .ql-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .ql-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 6px;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .12s;background:var(--card);text-decoration:none}
    .ql-btn:hover{border-color:var(--navy);background:var(--primary-light);transform:translateY(-1px)}
    .ql-btn svg{width:20px;height:20px;stroke:var(--navy);fill:none;stroke-width:1.8}
    .ql-btn span{font-size:10px;font-weight:600;color:var(--navy);text-align:center;line-height:1.2}

    /* ── Empty widget state ── */
    .ws-empty{text-align:center;padding:20px;color:var(--muted);font-size:11px}

    /* ── Chip strip inside widget ── */
    .ws-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
    .ws-chip{display:flex;flex-direction:column;align-items:center;padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--bg);min-width:54px;cursor:pointer;transition:background .1s}
    .ws-chip:hover{background:#D1EAF0}
    .ws-chip-val{font-size:14px;font-weight:800;color:var(--navy)}
    .ws-chip-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:1px}
    .ws-chip.red .ws-chip-val{color:var(--red)}
    .ws-chip.amber .ws-chip-val{color:var(--amber)}
    .ws-chip.green .ws-chip-val{color:var(--green)}
  </style>
</head>
<body>
<div class="shell">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <!-- Injected by shell.js -->
  </nav>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <!-- Injected by shell.js -->
    </header>

    <div class="page-body">

      <!-- Workspace Toolbar -->
      <div class="ws-toolbar">
        <div class="ws-title">My Workspace</div>
        <span class="ws-sub" id="wsGreeting"></span>
        <div class="ws-spacer"></div>
        <select class="svc-select" id="presetSelect" onchange="applyPreset(this.value)" style="background:rgba(14,116,144,.1);border-color:var(--border-dk);color:var(--navy);height:28px;font-size:11px;font-weight:600">
          <option value="">Custom Layout</option>
          <option value="tech">Technician</option>
          <option value="ops">Ops Manager</option>
          <option value="billing">Billing</option>
          <option value="sales">Sales</option>
        </select>
        <button class="btn btn-outline" id="btnEditLayout" onclick="toggleEditMode()" style="gap:5px;font-size:11px">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Edit Layout
        </button>
      </div>

      <div id="skWorkspace" style="padding:4px 12px"></div>
      <!-- Widget Grid -->
      <div class="ws-grid" id="wsGrid"></div>

    </div><!-- /page-body -->
  </div><!-- /main -->
</div><!-- /shell -->


<!-- Widget Picker Panel -->
<div class="picker-overlay" id="pickerOverlay" onclick="closePicker()"></div>
<div class="drawer" id="pickerPanel">
  <div class="picker-head">
    <div class="picker-head-title">Add Widgets</div>
    <button class="picker-close" onclick="closePicker()">&#10005;</button>
  </div>
  <div class="picker-list" id="pickerList"></div>
</div>


<script src="shell.js"></script>
<script src="api.js"></script>
<script>
// Auth
try {
  if (!API.requireAuth()) throw new Error('redirect');
} catch(e) {
  if (e.message === 'redirect') window.location = 'login.html';
}

// ── Greeting ──────────────────────────────────────────────────────────────────
(function() {
  var h = new Date().getHours();
  var g = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('wsGreeting').textContent = g + ', Joseph';
})();

// ── Repair data cache for widgets ─────────────────────────────────────────────
var _wsRepairs = [];
async function _loadWsRepairs() {
  try {
    var list = await API.getRepairList();
    _wsRepairs = Array.isArray(list) ? list : [];
    renderGrid();
  } catch(e) {
    console.error('[workspace] could not load repairs:', e.message);
  }
}

// ── Widget Definitions ─────────────────────────────────────────────────────────
var WIDGET_DEFS = [
  {
    id: 'repair-queue',
    title: 'Repair Queue',
    icon: '🔧',
    desc: 'Open scope repairs by status',
    span: 2,
    render: function(body) {
      var repairs = _wsRepairs;
      var open = repairs.filter(function(r) { return !r.bComplete && !r.bCancelled; });

      // Status buckets
      var received = open.filter(function(r) { return (r.sRepairStatus || '').match(/received|logged/i); }).length;
      var inRepair = open.filter(function(r) { return (r.sRepairStatus || '').match(/in.?repair|in.?progress|repair/i); }).length;
      var qcHold = open.filter(function(r) { return (r.sRepairStatus || '').match(/qc|hold|inspect/i); }).length;
      var shipReady = open.filter(function(r) { return (r.sRepairStatus || '').match(/ship|complete|ready/i); }).length;
      // Overdue = open repairs past SLA (7 days default)
      var now = new Date();
      var overdue = open.filter(function(r) {
        if (!r.dtDateReceived) return false;
        var d = Math.floor((now - new Date(r.dtDateReceived)) / 86400000);
        return d > 7;
      }).length;

      // Fallback if no status classification matched
      if (received + inRepair + qcHold + shipReady === 0 && open.length > 0) {
        inRepair = open.length;
      }

      var data = [
        {status:'Received',  count:received || 0, cls:'b-blue'},
        {status:'In Repair', count:inRepair || 0, cls:'b-amber'},
        {status:'QC Hold',   count:qcHold || 0,   cls:'b-red'},
        {status:'Ship Ready',count:shipReady || 0, cls:'b-green'},
        {status:'Overdue',   count:overdue || 0,   cls:'b-red'},
      ];
      var chips = data.map(function(d) {
        return '<div class="ws-chip ' + (d.cls==='b-red'?'red':d.cls==='b-amber'?'amber':d.cls==='b-green'?'green':'') + '" onclick="location=\'repairs.html\'">' +
          '<div class="ws-chip-val">' + d.count + '</div>' +
          '<div class="ws-chip-lbl">' + d.status + '</div>' +
          '</div>';
      }).join('');

      // Recent open repairs — first 4 by date
      var recent = open.sort(function(a,b) {
        return new Date(b.dtDateReceived || 0) - new Date(a.dtDateReceived || 0);
      }).slice(0, 4);
      var tbl = recent.map(function(r) {
        var days = r.dtDateReceived ? Math.floor((now - new Date(r.dtDateReceived)) / 86400000) : 0;
        var sla = 7;
        var over = days > sla;
        var cls = over ? 'b-red' : (sla - days <= 1 ? 'b-amber' : 'b-blue');
        var wo = r.sTaskNumber || r.sRepairNumber || ('WO-' + (r.lRepairKey || ''));
        var client = r.sClientName || r.sClientName1 || '';
        var scope = r.sScopeTypeDesc || r.sScopeType || '';
        var stat = r.sRepairStatus || 'Open';
        return '<tr onclick="location=\'repairs.html\'">' +
          '<td><span class="ws-tbl-code">' + wo + '</span></td>' +
          '<td>' + client + '</td>' +
          '<td style="font-family:monospace;font-size:10.5px">' + scope + '</td>' +
          '<td style="text-align:center"><span class="ws-tbl-badge ' + cls + '">' + days + 'd / ' + sla + 'd</span></td>' +
          '<td><span class="ws-tbl-badge b-blue">' + stat + '</span></td>' +
          '</tr>';
      }).join('');
      body.innerHTML = '<div class="ws-chips">' + chips + '</div>' +
        '<table class="ws-table"><thead><tr><th>WO #</th><th>Client</th><th>Scope</th><th style="text-align:center">TAT/SLA</th><th>Status</th></tr></thead><tbody>' + tbl + '</tbody></table>';
    }
  },
  {
    id: 'my-tasks',
    title: 'My Tasks',
    icon: '✅',
    desc: 'Tasks assigned to you',
    span: 1,
    render: function(body) {
      var tasks = [
        {text:'Follow up on Tampa Gen quote IQ-2026-004', pri:'h', done:false},
        {text:'Review Shreveport contract renewal', pri:'u', done:false},
        {text:'Update scope model specs — Olympus PCF-190', pri:'n', done:false},
        {text:'Send shipping confirmation to Northside Hospital', pri:'n', done:true},
        {text:'Check outsource return from Storz', pri:'h', done:false},
      ];
      body.innerHTML = tasks.map(function(t, i) {
        var priMap = {u:'pri-u',h:'pri-h',n:'pri-n',l:'pri-l'};
        var priLabel = {u:'Urgent',h:'High',n:'Normal',l:'Low'};
        return '<div class="ws-task">' +
          '<div class="ws-task-check ' + (t.done?'done':'') + '" onclick="toggleTask(this)">' + (t.done?'✓':'') + '</div>' +
          '<div class="ws-task-text ' + (t.done?'done':'') + '">' + t.text + '</div>' +
          '<span class="ws-task-pri ' + priMap[t.pri] + '">' + priLabel[t.pri] + '</span>' +
          '</div>';
      }).join('');
    }
  },
  {
    id: 'overdue',
    title: 'Overdue / At Risk',
    icon: '⚠️',
    desc: 'Repairs past or approaching SLA',
    span: 1,
    render: function(body) {
      var repairs = _wsRepairs;
      var now = new Date();
      var sla = 7;
      var atRisk = repairs.filter(function(r) {
        if (r.bComplete || r.bCancelled || !r.dtDateReceived) return false;
        var days = Math.floor((now - new Date(r.dtDateReceived)) / 86400000);
        return days >= sla - 1;
      }).sort(function(a,b) {
        return new Date(a.dtDateReceived || 0) - new Date(b.dtDateReceived || 0);
      }).slice(0, 4);

      if (!atRisk.length) {
        body.innerHTML = '<div class="ws-empty">No overdue or at-risk repairs.</div>';
        return;
      }
      var tbl = atRisk.map(function(r) {
        var days = Math.floor((now - new Date(r.dtDateReceived)) / 86400000);
        var over = days > sla;
        var wo = r.sTaskNumber || r.sRepairNumber || ('WO-' + (r.lRepairKey || ''));
        return '<tr onclick="location=\'repairs.html\'">' +
          '<td><span class="ws-tbl-code">' + wo + '</span></td>' +
          '<td>' + (r.sClientName || r.sClientName1 || '') + '</td>' +
          '<td><span class="ws-tbl-badge ' + (over?'b-red':'b-amber') + '">' + days + 'd / ' + sla + 'd</span></td>' +
          '</tr>';
      }).join('');
      body.innerHTML = '<table class="ws-table"><thead><tr><th>WO #</th><th>Client</th><th>TAT/SLA</th></tr></thead><tbody>' + tbl + '</tbody></table>';
    }
  },
  {
    id: 'due-today',
    title: 'Due Today / Tomorrow',
    icon: '📅',
    desc: 'Repairs with imminent due dates',
    span: 1,
    render: function(body) {
      var items = [
        {wo:'NR26006544', client:'Valley Health System',   scope:'URF-V2',    when:'Today'},
        {wo:'NR26006543', client:'Coliseum Medical Center', scope:'GIF-190N', when:'Today'},
        {wo:'NR26006540', client:'Regional Medical Center',   scope:'CF-H185AL', when:'Tomorrow'},
        {wo:'NR26006539', client:'Tift Regional Medical Center',    scope:'PCF-190TL', when:'Tomorrow'},
      ];
      var tbl = items.map(function(r) {
        return '<tr onclick="location=\'repairs.html\'">' +
          '<td><span class="ws-tbl-code">' + r.wo + '</span></td>' +
          '<td>' + r.client + '</td>' +
          '<td style="font-family:monospace;font-size:10.5px">' + r.scope + '</td>' +
          '<td><span class="ws-tbl-badge ' + (r.when==='Today'?'b-red':'b-amber') + '">' + r.when + '</span></td>' +
          '</tr>';
      }).join('');
      body.innerHTML = '<table class="ws-table"><thead><tr><th>WO #</th><th>Client</th><th>Scope</th><th>Due</th></tr></thead><tbody>' + tbl + '</tbody></table>';
    }
  },
  {
    id: 'instrument-repairs',
    title: 'Instrument Repairs',
    icon: '🔩',
    desc: 'Open rigid/surgical instrument orders',
    span: 1,
    render: function(body) {
      var items = [
        {num:'IR-2026-008', client:'Baptist Health', items:3, status:'In Progress'},
        {num:'IR-2026-005', client:'Regional Medical Center',        items:2, status:'Received'},
        {num:'IR-2026-006', client:'West Side GI Center',          items:1, status:'On Hold'},
        {num:'IR-2026-004', client:'Tampa General Hospital',    items:4, status:'Outsourced'},
      ];
      var tbl = items.map(function(r) {
        var cls = r.status==='On Hold'?'b-amber':r.status==='Outsourced'?'b-purple':r.status==='Received'?'b-blue':'b-amber';
        return '<tr onclick="location=\'instruments.html\'">' +
          '<td><span class="ws-tbl-code">' + r.num + '</span></td>' +
          '<td>' + r.client + '</td>' +
          '<td style="text-align:center">' + r.items + '</td>' +
          '<td><span class="ws-tbl-badge ' + cls + '">' + r.status + '</span></td>' +
          '</tr>';
      }).join('');
      body.innerHTML = '<table class="ws-table"><thead><tr><th>Order #</th><th>Client</th><th style="text-align:center">Items</th><th>Status</th></tr></thead><tbody>' + tbl + '</tbody></table>';
    }
  },
  {
    id: 'pending-quotes',
    title: 'Pending Quotes',
    icon: '📄',
    desc: 'Instrument quotes awaiting response',
    span: 1,
    render: function(body) {
      var items = [
        {num:'IQ-2026-009', client:'Baptist Health', total:'$1,250', status:'Sent'},
        {num:'IQ-2026-005', client:'Regional Medical Center',        total:'$426',   status:'Sent'},
        {num:'IQ-2026-007', client:'West Side GI Center',          total:'—',      status:'Draft'},
        {num:'IQ-2026-002', client:'Northside Hospital',        total:'$807',   status:'Draft'},
      ];
      var tbl = items.map(function(r) {
        return '<tr onclick="location=\'instruments.html?tab=quotes\'">' +
          '<td><span class="ws-tbl-code">' + r.num + '</span></td>' +
          '<td>' + r.client + '</td>' +
          '<td style="font-weight:600">' + r.total + '</td>' +
          '<td><span class="ws-tbl-badge ' + (r.status==='Sent'?'b-blue':'b-amber') + '">' + r.status + '</span></td>' +
          '</tr>';
      }).join('');
      body.innerHTML = '<table class="ws-table"><thead><tr><th>Quote #</th><th>Client</th><th>Total</th><th>Status</th></tr></thead><tbody>' + tbl + '</tbody></table>';
    }
  },
  {
    id: 'outstanding-invoices',
    title: 'Outstanding Invoices',
    icon: '💰',
    desc: 'Unpaid invoices summary',
    span: 1,
    render: function(body) {
      body.innerHTML = [
        {label:'Total Outstanding',  val:'$148,420', icon:'💲', bg:'#F0FDF4', cls:'green'},
        {label:'Past Due 30+',       val:'$22,180',  icon:'⚠️',  bg:'#FEF2F2', cls:'red'},

// ── Widget ID → def map ────────────────────────────────────────────────────────
var WIDGET_MAP = {};
WIDGET_DEFS.forEach(function(d){ WIDGET_MAP[d.id] = d; });

// ── User prefs (localStorage) ──────────────────────────────────────────────────
var PREFS_KEY = 'tsi_workspace_' + (API.getUser ? (API.getUser()||{}).lUserKey||'default' : 'default');
var DEFAULT_LAYOUT = ['repair-queue','due-today','my-tasks','overdue','contracts-expiring','outstanding-invoices','tat-performance'];

function loadPrefs() {
  try {
    var raw = localStorage.getItem(PREFS_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return DEFAULT_LAYOUT.slice();
}

function savePrefs(layout) {
  try { localStorage.setItem(PREFS_KEY, JSON.stringify(layout)); } catch(e) {}
}

// ── State ──────────────────────────────────────────────────────────────────────
var currentLayout = loadPrefs();
var editMode = false;

// ── Render Grid ───────────────────────────────────────────────────────────────
function renderGrid() {
  var grid = document.getElementById('wsGrid');
  grid.innerHTML = '';

  currentLayout.forEach(function(id) {
    var def = WIDGET_MAP[id];
    if (!def) return;
    var wc = document.createElement('div');
    wc.className = 'wc' + (def.span > 1 ? ' span' + def.span : '');
    wc.dataset.id = id;

    // Remove button (edit mode)
    var rmBtn = document.createElement('button');
    rmBtn.className = 'wc-remove';
    rmBtn.innerHTML = '&#10005;';
    rmBtn.title = 'Remove widget';
    rmBtn.onclick = function(e) { e.stopPropagation(); removeWidget(id); };
    wc.appendChild(rmBtn);

    // Header
    var head = document.createElement('div');
    head.className = 'wc-head';
    head.innerHTML = '<span class="wc-icon">' + def.icon + '</span>' +
      '<span class="wc-title">' + def.title + '</span>' +
      '<span class="wc-action" onclick="location=\'' + (linkFor(id)) + '\'">View all ›</span>';
    wc.appendChild(head);

    // Body
    var body = document.createElement('div');
    body.className = 'wc-body';
    body.innerHTML = '<div class="ws-empty">Loading…</div>';
    wc.appendChild(body);

    grid.appendChild(wc);

    // Render async (paint first)
    setTimeout(function(b, d){ return function(){ try { d.render(b); } catch(e){ b.innerHTML='<div class="ws-empty">—</div>'; } }; }(body, def), 0);
  });

  if (editMode) {
    grid.classList.add('edit-mode');
    // Add "+ Add Widget" slot
    var slot = document.createElement('div');
    slot.className = 'wc-add-slot';
    slot.innerHTML = '<div style="text-align:center;color:var(--muted)"><div style="font-size:24px;margin-bottom:6px">＋</div><div style="font-size:11px;font-weight:600">Add Widget</div></div>';
    slot.onclick = openPicker;
    slot.style.display = 'flex';
    grid.appendChild(slot);
  } else {
    grid.classList.remove('edit-mode');
  }
}

function linkFor(id) {
  var map = {
    'repair-queue':'repairs.html','my-tasks':'development-list.html','overdue':'dashboard.html',
    'due-today':'repairs.html','instrument-repairs':'instruments.html','pending-quotes':'instruments.html',
    'outstanding-invoices':'financial.html','contracts-expiring':'contracts.html',
    'inventory-alerts':'inventory.html','quick-links':'#','scope-stats':'departments.html','tat-performance':'dashboard.html'
  };
  return map[id] || '#';
}

// ── Edit Mode ─────────────────────────────────────────────────────────────────
function toggleEditMode() {
  editMode = !editMode;
  var btn = document.getElementById('btnEditLayout');
  if (editMode) {
    btn.textContent = '✓ Done';
    btn.style.background = 'var(--navy)';
    btn.style.color = '#fff';
    btn.style.border = 'none';
  } else {
    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Edit Layout';
    btn.style.background = '';
    btn.style.color = '';
    btn.style.border = '';
    closePicker();
  }
  renderGrid();
}

function removeWidget(id) {
  currentLayout = currentLayout.filter(function(x){ return x !== id; });
  savePrefs(currentLayout);
  renderGrid();
  refreshPickerList();
}

// ── Widget Picker ─────────────────────────────────────────────────────────────
function openPicker() {
  refreshPickerList();
  document.getElementById('pickerOverlay').classList.add('open');
  document.getElementById('pickerPanel').classList.add('open');
}

function closePicker() {
  document.getElementById('pickerOverlay').classList.remove('open');
  document.getElementById('pickerPanel').classList.remove('open');
}

function refreshPickerList() {
  var list = document.getElementById('pickerList');
  list.innerHTML = '<div class="picker-section">Available Widgets</div>' +
    WIDGET_DEFS.map(function(def) {
      var added = currentLayout.indexOf(def.id) >= 0;
      return '<div class="picker-item ' + (added?'added':'') + '" onclick="addWidget(\'' + def.id + '\')">' +
        '<div class="pi-icon">' + def.icon + '</div>' +
        '<div class="pi-info"><div class="pi-title">' + def.title + '</div><div class="pi-desc">' + def.desc + '</div></div>' +
        '<button class="pi-add">' + (added ? '✓ Added' : '+ Add') + '</button>' +
        '</div>';
    }).join('');
}

function addWidget(id) {
  if (currentLayout.indexOf(id) >= 0) return;
  currentLayout.push(id);
  savePrefs(currentLayout);
  renderGrid();
  refreshPickerList();
}

// ── Task toggle ───────────────────────────────────────────────────────────────
function toggleTask(el) {
  var isDone = el.classList.toggle('done');
  el.textContent = isDone ? '✓' : '';
  var textEl = el.nextElementSibling;
  if (textEl) textEl.classList.toggle('done', isDone);
}

// ── Close new order menu on outside click ─────────────────────────────────────
document.addEventListener('click', function(e) {
  var wrap = document.getElementById('newOrderWrap');
  var menu = document.getElementById('newOrderMenu');
  if (wrap && !wrap.contains(e.target)) menu.style.display = 'none';
});

// ── Role-Based Workspace Presets ────────────────────────────────────────────
var PRESETS = {
  tech:    { label:'Technician',  widgets:['myRepairs','inspQueue','todaysTasks','flags'] },
  ops:     { label:'Ops Manager', widgets:['kpiOverview','repairPipeline','todaysTasks','loanerTracker','quickLinks','flags'] },
  billing: { label:'Billing',     widgets:['invoiceQueue','quickLinks','todaysTasks','flags'] },
  sales:   { label:'Sales',       widgets:['kpiOverview','quickLinks','todaysTasks','flags'] }
};

function applyPreset(presetKey) {
  if (!presetKey) return;
  localStorage.setItem('tsi_ws_preset', presetKey);
  var preset = PRESETS[presetKey];
  if (!preset) return;
  // Map preset widget names to the WIDGETS array indexes
  var newLayout = [];
  preset.widgets.forEach(function(wName) {
    var found = WIDGETS.findIndex(function(w) { return w.id === wName; });
    if (found >= 0) newLayout.push(found);
  });
  if (newLayout.length) {
    layout = newLayout;
    localStorage.setItem('tsi_ws_layout', JSON.stringify(layout));
    renderGrid();
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
if (typeof API !== 'undefined' && API.UI) API.UI.init();
if(API && API.UI) API.UI.showSkeleton('skWorkspace', 5);
// Restore preset selection
var savedPreset = localStorage.getItem('tsi_ws_preset') || '';
var presetSel = document.getElementById('presetSelect');
if (presetSel && savedPreset) presetSel.value = savedPreset;
renderGrid();
if(API && API.UI) API.UI.hideSkeleton('skWorkspace');
_loadWsRepairs();
</script>
